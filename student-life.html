        #spu-loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(180deg, rgba(32, 39, 89, 0.96) 0%, rgba(111, 22, 22, 0.93) 100%);
            color: #ffffff;
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            transition: opacity 0.36s ease, visibility 0.36s ease;
        }

        #spu-loading-overlay.spu-loading-screen--hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .spu-loading-screen {
            width: min(100%, 560px);
            padding: 2.25rem 2rem;
            border-radius: 2rem;
            background: rgba(8, 11, 28, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 42px 120px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(24px);
        }

        .spu-loading-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .spu-loading-logo-wrapper {
            width: 4.4rem;
            height: 4.4rem;
            padding: 0.8rem;
            border-radius: 1.3rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spu-loading-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .spu-loading-copy {
            min-width: 0;
        }

        .spu-loading-eyebrow {
            margin: 0;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.72);
            font-weight: 700;
        }

        .spu-loading-title {
            margin: 0.35rem 0 0;
            font-size: clamp(1.8rem, 2.5vw, 2.3rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: #ffffff;
            font-weight: 800;
        }

        .spu-loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .spu-loading-indicator span {
            width: 0.85rem;
            height: 0.85rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.68);
            opacity: 0.7;
            animation: spuLoadingPulse 1.1s ease-in-out infinite;
        }

        .spu-loading-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .spu-loading-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        .spu-loading-help {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .spu-loading-help[data-visible="true"] {
            display: block;
        }

        .spu-loading-help p {
            margin: 0;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.7;
            font-size: 0.97rem;
        }

        .spu-loading-help code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.08);
            padding: 0.1rem 0.35rem;
            border-radius: 0.4rem;
        }

        .spu-loading-actions {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .spu-loading-action {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            padding: 0.78rem 1rem;
            border-radius: 999px;
            cursor: pointer;
        }

        .spu-loading-action--primary {
            background: #ffffff;
            color: #202759;
        }

        @keyframes spuLoadingPulse {
            0%, 100% {
                transform: scale(0.92);
                opacity: 0.65;
            }
            50% {
                transform: scale(1.16);
                opacity: 1;
            }
        }

        @media (max-width: 640px) {
            .spu-loading-screen {
                padding: 1.5rem;
                border-radius: 1.5rem;
            }

            .spu-loading-brand {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

            <div class="lg:col-span-2">
                <h3 class="mb-8 text-[18px] font-bold uppercase tracking-widest text-white/50" x-text="$store.app.currentLang === 'ar' ? $store.footer.resources.titleAr : $store.footer.resources.titleEn"></h3>
                <ul class="flex flex-col gap-4">
                    <template x-for="link in $store.footer.resources.links" :key="link.labelEn">
                        <li>
                            <a :href="link.url" class="text-[16px] text-white/80 transition-colors hover:text-white" x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn"></a>
                        </li>
                    </template>
                </ul>
            </div>

            <div class="lg:col-span-3">
                <h3 class="mb-8 text-[18px] font-bold uppercase tracking-widest text-white/50" x-text="$store.app.currentLang === 'ar' ? $store.footer.contact.titleAr : $store.footer.contact.titleEn"></h3>
                <div class="flex flex-col gap-6">
                    <template x-for="item in $store.footer.contact.items" :key="item.icon + item.textEn">
                        <div class="flex items-start gap-4">
                            <i :class="item.icon" class="mt-1.5 text-spu-red"></i>
                            <span class="text-[15px] leading-relaxed text-white/80" :class="item.ltr ? 'ltr' : ''" x-html="$store.app.currentLang === 'ar' ? item.textAr : item.textEn"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex flex-col items-start lg:col-span-3 lg:items-end">
                <h3 class="mb-8 w-full text-left text-[18px] font-bold uppercase tracking-widest text-white/50" :class="$store.app.currentLang === 'ar' ? 'lg:text-right' : 'lg:text-left'" x-text="$store.app.currentLang === 'ar' ? $store.footer.location.titleAr : $store.footer.location.titleEn"></h3>
                <div class="group h-[180px] w-full overflow-hidden rounded-[12px] border border-white/10 shadow-2xl">
                    <iframe :src="$store.footer.location.mapUrl" class="h-full w-full grayscale-[0.3] opacity-80 transition-all duration-700 group-hover:grayscale-0 group-hover:opacity-100" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>

        <hr class="mb-8 border-white/10">

        <div class="flex flex-col items-center justify-between gap-6 md:flex-row">
            <p class="text-[14px] text-white/50" translate="no" x-html="$store.app.currentLang === 'ar' ? $store.footer.bottom.copyrightAr : $store.footer.bottom.copyrightEn"></p>

            <div class="flex flex-wrap items-center justify-center gap-6 text-[14px]">
                <template x-for="link in $store.footer.bottom.links" :key="link.labelEn">
                    <a :href="link.protected ? '/services.html#portal-access' : link.url" @click="if (link.protected) { $event.preventDefault(); $store.auth.requestProtectedAccess(link.url); }" class="text-white/50 transition-colors hover:text-white" :target="!link.protected && link.url.startsWith('http') ? '_blank' : null" :rel="!link.protected && link.url.startsWith('http') ? 'noreferrer' : null" x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn"></a>
                </template>
            </div>
        </div>
    </div>
</footer>
    </div>
    <script>
        (function () {
            window.__spuLoadingFallbackTimer = window.setTimeout(function () {
                var body = document.body;
                if (!body || body.dataset.appReady !== 'loading') {
                    return;
                }

                var help = document.querySelector('[data-loading-help]');
                var helpText = document.querySelector('[data-loading-help-text]');
                var isLocal = /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname);

                if (help) {
                    help.setAttribute('data-visible', 'true');
                }

                if (helpText) {
                    helpText.innerHTML = isLocal
                        ? 'The app bundle has not started yet. If you are running locally, start the site with <code>npm run dev</code> or serve the built <code>dist</code> folder.'
                        : 'The app bundle has not started yet. You can reload the page or continue to the fallback content.';
                }
            }, 3500);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
