<section
    x-data="{
        hasCounted: false,
        runCount() {
            if (this.hasCounted) return;
            this.hasCounted = true;
            this.$store.stats.startCounting();
        },
        init() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    this.runCount();
                    observer.disconnect();
                }
            }, { threshold: 0 });

            observer.observe(this.$el);

            const rect = this.$el.getBoundingClientRect();
            const inView = rect.top < window.innerHeight && rect.bottom > 0;
            if (inView) {
                this.runCount();
                observer.disconnect();
            }
        }
    }"
    class="text-white font-hacen overflow-hidden absolute top-[801px] left-[136px]">
    <div class="container">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-[71px] text-center">
            <template x-for="stat in $store.stats.items" :key="stat.id">
                <div class="group rounded-2xl">
                    <div class="mb-6 flex justify-center">
                        <div class="w-[257px] h-[281px] rounded-xl pb-5 bg-spu-blue text-white duration-300">
                            <img :src="stat.svgPath" :alt="stat.labelEn" class="w-[101px] h-[101px] mt-[38px] mx-auto">
                            <div class="text-4xl font-bold mt-[13px]">
                                <span x-show="stat.plus" x-text="stat.plus"></span>
                                <span x-text="stat.current"></span>
                            </div>
                            <p class="text-[24px] max-w-[140px] mx-auto font-bold"
                                x-text="$store.app.currentLang === 'ar' ? stat.labelAr : stat.labelEn">
                            </p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</section>
