<section
    x-data="{
        slidePaths(direction) {
            const track = this.$refs.pathsTrack;
            if (!track) return;

            const firstCard = track.querySelector('.path-card');
            const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 292;
            const gap = 24;
            const step = Math.round(cardWidth + gap);
            const nextLeft = track.scrollLeft + (direction === 'right' ? step : -step);

            track.scrollTo({
                left: nextLeft,
                behavior: 'smooth'
            });
        }
    }"
    class="py-7.5 mt-[70px] relative overflow-hidden font-hacen"
    style="background-color: #EAF3FF40;"
>
    <div class="container relative">
        <div class="flex flex-col h-[450px] lg:flex-row items-center gap-12 relative">
            <div class="w-full relative lg:w-[322px] h-[435px] text-center bg-[#1e2652] rounded-[16px] flex flex-col justify-center items-start text-white shrink-0 overflow-hidden group shadow-2xl z-20">
                <div class="absolute inset-0 opacity-[0.15] z-0 animate-slow-pan" style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 30px 30px;"></div>

                <div class="relative z-10 w-full px-8 text-right">
                    <div class="w-12 mx-auto h-1 bg-spu-red mb-6"></div>
                    <h2 class="text-[40px] text-center font-bold leading-tight mb-4 uppercase">
                        <span x-text="$store.app.currentLang === 'ar' ? 'اختر' : 'Choose'"></span>
                        <br>
                        <span class="text-spu-red brightness-125" x-text="$store.app.currentLang === 'ar' ? 'مسارك' : 'Your Path'"></span>
                    </h2>
                </div>
            </div>

            <div
                x-ref="pathsTrack"
                class="flex-1 w-full h-[390px] flex flex-nowrap gap-6 bg-transparent overflow-x-auto overflow-y-hidden no-scrollbar scroll-smooth px-4 items-start z-10"
            >
                <template x-for="path in $store.paths.items" :key="path.id">
                    <div
                        @mouseenter="$store.paths.activePath = path.id"
                        @mouseleave="$store.paths.activePath = null"
                        :class="{
                            'opacity-40 grayscale-[0.3] scale-95 blur-[0.5px]': $store.paths.activePath !== null && $store.paths.activePath !== path.id,
                            'bg-[#1e2652] text-white z-20 border-transparent': $store.paths.activePath === path.id,
                            'bg-white text-gray-800 border-gray-100 shadow-sm': $store.paths.activePath !== path.id,
                            'opacity-100': $store.paths.activePath === null
                        }"
                        class="path-card w-[292px] h-[380px] hover:cursor-pointer shrink-0 relative rounded-[24px] border transition-all duration-500 ease-out group overflow-hidden flex flex-col p-5"
                    >
                        <div class="absolute top-0 left-0 w-full h-0 group-hover:h-[6px] z-50 transition-all duration-300 bg-spu-red"></div>

                        <div
                            class="w-14 h-14 rounded-xl flex items-center justify-center mb-6 transition-all duration-500"
                            :class="$store.paths.activePath === path.id ? 'bg-white/10 text-white' : 'bg-gray-50 text-spu-blue'"
                        >
                            <img
                                :src="path.icon"
                                :alt="$store.app.currentLang === 'ar' ? path.titleAr : path.titleEn"
                                class="w-8 h-8 object-contain"
                            >
                        </div>

                        <h3
                            class="text-[22px] font-bold mb-4 leading-tight transition-colors"
                            x-text="$store.app.currentLang === 'ar' ? path.titleAr : path.titleEn"
                        ></h3>

                        <ul class="space-y-3 mb-6 flex-1">
                            <template x-for="link in ($store.app.currentLang === 'ar' ? path.linksAr : path.linksEn)">
                                <li class="flex items-center gap-2 text-[13px] opacity-60 group-hover:opacity-100 transition-opacity">
                                    <span class="w-1.5 h-1.5 rounded-full bg-current opacity-40"></span>
                                    <span x-text="link"></span>
                                </li>
                            </template>
                        </ul>

                        <div
                            class="mt-auto flex items-center justify-between text-[13px] font-bold transition-all"
                            :class="$store.paths.activePath === path.id ? 'text-blue-300' : 'text-spu-blue'"
                        >
                            <span x-text="$store.app.ui.learnMore[$store.app.currentLang]"></span>
                            <i class="fas fa-arrow-right text-[12px] transition-transform group-hover:translate-x-2"></i>
                        </div>
                    </div>
                </template>

                <div class="w-8 shrink-0 lg:hidden"></div>
            </div>
        </div>

        <div class="flex items-center gap-4 relative top-[-20px] justify-center lg:justify-end">
            <button
                type="button"
                @click="slidePaths('left')"
                class="w-[45px] h-[40px] text-spu-blue hover:cursor-pointer hover:scale-150 transition-all flex items-center justify-center"
            >
                <i class="fas fa-chevron-left text-sm transition-transform group-hover/btn:-translate-x-1"></i>
            </button>
            <button
                type="button"
                @click="slidePaths('right')"
                class="w-[45px] h-[40px] text-spu-blue hover:cursor-pointer hover:scale-150 transition-all flex items-center justify-center"
            >
                <i class="fas fa-chevron-right text-sm transition-transform group-hover/btn:translate-x-1"></i>
            </button>
        </div>
    </div>
</section>
