<section x-data="calendarApp()" class="overflow-hidden bg-white py-16 font-hacen lg:py-20">
    <div class="container">
        <h2 class="mb-8 text-[34px] font-bold tracking-tight text-[#1e2652] sm:mb-10 sm:text-[42px] lg:text-[52px]">
            SP<span class="text-spu-red">U</span> Events & Activities
        </h2>

        <div class="grid grid-cols-1 gap-10 xl:grid-cols-[minmax(0,560px)_minmax(0,1fr)] xl:items-start">
            <div class="overflow-hidden rounded-[20px] bg-white shadow-[0_18px_40px_rgba(0,0,0,0.22)]">
                <template x-if="selectedEvent">
                    <article class="flex min-h-[440px] flex-col">
                        <div class="relative h-[220px] overflow-hidden md:h-[250px]">
                            <img :src="selectedEvent.image" :alt="selectedEvent.title" class="h-full w-full object-cover">
                            <div class="absolute left-6 top-6 rounded-[10px] bg-[#27316d] px-7 py-2 text-[15px] font-bold text-white"
                                x-text="selectedEvent.type"></div>
                        </div>

                        <div class="flex flex-1 flex-col bg-[#edf2fa] px-8 py-6 md:px-8 md:py-5">
                            <p class="mb-5 text-[15px] font-bold text-[#c63030]" x-text="selectedEvent.dateText"></p>
                            <p class="mb-6 text-[17px] leading-[1.65] text-[#55627c]" x-text="selectedEvent.description"></p>

                            <a :href="selectedEvent.link || '#'"
                                class="inline-flex w-fit items-center gap-2 text-[18px] font-bold text-[#1e2652] transition hover:text-spu-red">
                                Explore Details
                                <i class="fas fa-chevron-right text-[11px]"></i>
                            </a>

                            <div class="mt-auto pt-5">
                                <div class="border-t border-[#9c2a2a]"></div>
                                <div class="flex items-center justify-center gap-2 pt-7">
                                    <template x-for="(eventItem, index) in selectedDateEvents" :key="eventItem.id">
                                        <button type="button" @click="selectEvent(index)"
                                            class="h-[8px] rounded-full transition-all duration-300"
                                            :class="activeEventIndex === index ? 'w-[24px] bg-[#27316d]' : 'w-[8px] bg-[#d1d5de]'"
                                            :aria-label="`View event ${index + 1}`"></button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </article>
                </template>

                <template x-if="!selectedEvent">
                    <div class="flex min-h-[440px] flex-col items-center justify-center bg-[#edf2fa] px-10 text-center">
                        <p class="mb-4 text-[15px] font-bold text-[#c63030]" x-text="selectedDateLabel"></p>
                        <p class="max-w-[360px] text-[18px] leading-[1.7] text-[#55627c]">
                            There are no events scheduled for this date. Please choose another day from the calendar.
                        </p>
                    </div>
                </template>
            </div>

            <div class="rounded-[28px] bg-white px-6 py-7 shadow-[0_18px_40px_rgba(0,0,0,0.18)] sm:px-8 sm:py-8 lg:px-7 xl:min-h-[440px] xl:px-8">
                <div class="mb-7 flex items-start justify-between gap-4">
                    <div class="flex items-end gap-5 text-[#1e2652]">
                        <span class="text-[21px] font-bold" x-text="viewDate.format('MMMM')"></span>
                        <span class="text-[40px] font-black leading-none sm:text-[48px]" x-text="viewDate.format('YYYY')"></span>
                    </div>

                    <div class="flex items-center gap-2 text-[#111111]">
                        <button type="button" @click="prevMonth()"
                            class="flex h-10 w-10 items-center justify-center rounded-full transition hover:bg-gray-100">
                            <i class="fas fa-chevron-left text-[15px]"></i>
                        </button>
                        <button type="button" @click="nextMonth()"
                            class="flex h-10 w-10 items-center justify-center rounded-full transition hover:bg-gray-100">
                            <i class="fas fa-chevron-right text-[15px]"></i>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-y-3 sm:gap-y-4">
                    <template x-for="day in calendarDays" :key="day.date">
                        <button type="button" @click="selectDate(day.date)"
                            class="relative mx-auto flex h-[50px] w-[50px] items-center justify-center rounded-[14px] transition-colors sm:h-[56px] sm:w-[56px]"
                            :class="selectedDate === day.date ? 'bg-[#27316d]' : 'bg-transparent hover:bg-[#f5f7fc]'">
                            <span class="text-[18px] font-semibold transition-colors sm:text-[20px]"
                                :class="selectedDate === day.date ? 'text-white' : day.isCurrentMonth ? 'text-[#111111]' : 'text-[#d0d0d0]'"
                                x-text="day.dayNumber"></span>

                            <span x-show="day.hasEvent && selectedDate !== day.date"
                                class="absolute bottom-[6px] left-1/2 h-[4px] w-[4px] -translate-x-1/2 rounded-full bg-[#27316d]"></span>
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </div>
</section>
