<section x-data class="bg-white py-20 font-hacen lg:py-24">
    <div class="container">
        <div class="max-w-3xl">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? 'مسار القبول' : 'Admissions Path'"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight text-spu-blue md:text-4xl" x-text="$store.app.currentLang === 'ar' ? 'خطوات واضحة من الاستفسار إلى التسجيل' : 'A clear sequence from inquiry to enrollment'"></h2>
        </div>

        <div class="mt-10 grid gap-6 lg:grid-cols-2 xl:grid-cols-4">
            <template x-for="step in $store.admissionsPage.steps" :key="step.number">
                <article class="rounded-[28px] border border-slate-200/80 bg-white p-7 shadow-[0_20px_55px_rgba(20,30,70,0.07)]">
                    <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-spu-blue text-sm font-bold tracking-[0.2em] text-white" x-html="step.number"></span>
                    <h3 class="mt-5 text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? step.titleAr : step.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? step.summaryAr : step.summaryEn"></p>
                </article>
            </template>
        </div>
    </div>
</section>
