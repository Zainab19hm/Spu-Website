<section id="admissions-support" x-data class="bg-white py-20 font-hacen lg:py-24">
    <div class="container">
        <div class="max-w-3xl">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? 'قنوات التواصل' : 'Contact Channels'"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight text-spu-blue md:text-4xl" x-text="$store.app.currentLang === 'ar' ? 'الوصول إلى الجهة الصحيحة بشكل أسرع' : 'Reach the right office more quickly'"></h2>
        </div>

        <div class="mt-10 grid gap-6 md:grid-cols-3">
            <template x-for="item in $store.contactPage.channels" :key="item.titleEn">
                <a :href="item.url" class="rounded-[28px] border border-slate-200/80 bg-white p-7 shadow-[0_18px_50px_rgba(20,30,70,0.08)] transition-transform duration-300 hover:-translate-y-1">
                    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-section text-spu-blue">
                        <i :class="item.icon"></i>
                    </div>
                    <h3 class="mt-5 text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-html="item.detail"></p>
                </a>
            </template>
        </div>
    </div>
</section>
