<section id="visit-campus" x-data class="bg-section py-20 font-hacen lg:py-24">
    <div class="container grid gap-10 lg:grid-cols-[1.05fr_0.95fr]">
        <div>
            <div class="max-w-3xl">
                <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? 'المكاتب والمواقع' : 'Offices and Locations'"></p>
                <h2 class="mt-5 text-3xl font-bold leading-tight text-spu-blue md:text-4xl" x-text="$store.app.currentLang === 'ar' ? 'هيكل أوضح للزيارات والدعم المؤسسي' : 'A clearer structure for visits and institutional support'"></h2>
            </div>

            <div class="mt-10 grid gap-5">
                <template x-for="office in $store.contactPage.offices" :key="office.titleEn">
                    <article class="rounded-[28px] bg-white p-7 shadow-[0_18px_50px_rgba(20,30,70,0.08)]">
                        <h3 class="text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? office.titleAr : office.titleEn"></h3>
                        <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? office.summaryAr : office.summaryEn"></p>
                    </article>
                </template>
            </div>
        </div>

        <div class="rounded-[32px] bg-spu-blue p-8 text-white shadow-[0_28px_80px_rgba(20,30,70,0.18)] lg:p-10">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-white/55" x-text="$store.app.currentLang === 'ar' ? $store.contactPage.visit.eyebrowAr : $store.contactPage.visit.eyebrowEn"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight" x-text="$store.app.currentLang === 'ar' ? $store.contactPage.visit.titleAr : $store.contactPage.visit.titleEn"></h2>
            <p class="mt-6 text-[16px] leading-8 text-white/80" x-text="$store.app.currentLang === 'ar' ? $store.contactPage.visit.summaryAr : $store.contactPage.visit.summaryEn"></p>

            <div class="mt-8 space-y-4">
                <template x-for="item in $store.contactPage.supportCards" :key="item.titleEn">
                    <a :href="item.url" class="block rounded-[22px] border border-white/12 bg-white/8 px-5 py-4 text-white/85 backdrop-blur-sm">
                        <p class="text-sm font-bold uppercase tracking-[0.22em]" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></p>
                        <p class="mt-3 text-[15px] leading-7" x-html="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                    </a>
                </template>
            </div>
        </div>
    </div>
</section>
