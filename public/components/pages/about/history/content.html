<section class="py-12 px-6 bg-slate-50/50 rounded-[3rem] border border-slate-100 shadow-inner">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-16">
            <p class="text-sm font-bold uppercase tracking-widest text-spu-red"
                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.history.eyebrowAr : $store.aboutPage.history.eyebrowEn">
            </p>
            <h1 class="mt-4 text-4xl md:text-5xl font-bold text-spu-blue"
                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.history.titleAr : $store.aboutPage.history.titleEn">
            </h1>
            <div class="mt-6 h-1 w-24 bg-spu-red mx-auto rounded-full"></div>
        </header>

        <div class="relative">
            <div class="absolute right-1/2 translate-x-1/2 top-0 bottom-0 w-px bg-slate-200 hidden md:block"></div>

            <div class="space-y-12 relative z-10">
                <template x-for="(point, index) in $store.aboutPage.historyPoints" :key="index">
                    <div class="flex flex-col md:flex-row items-center gap-8"
                        :class="index % 2 === 0 ? 'md:flex-row-reverse' : ''">
                        <div class="flex-1 text-center" :class="index % 2 === 0 ? 'md:text-right' : 'md:text-left'">
                            <span class="inline-block px-4 py-1 rounded-full bg-spu-blue text-white text-sm font-bold mb-4"
                                x-text="point.year"></span>
                            <h3 class="text-2xl font-bold text-spu-blue mb-4"
                                x-text="$store.app.currentLang === 'ar' ? point.titleAr : point.titleEn"></h3>
                            <p class="text-slate-600 leading-relaxed"
                                x-text="$store.app.currentLang === 'ar' ? point.descAr : point.descEn"></p>
                        </div>

                        <div
                            class="w-12 h-12 rounded-full bg-white border-4 border-slate-100 flex items-center justify-center text-spu-red shadow-sm z-20">
                            <i class="fas fa-circle text-[10px]"></i>
                        </div>

                        <div class="flex-1 hidden md:block"></div>
                    </div>
                </template>
            </div>
        </div>

        <div class="mt-20 pt-10 border-t border-slate-100 text-center">
            <a href="/about.html"
                class="inline-flex items-center gap-3 px-8 py-4 rounded-2xl bg-white border border-slate-200 text-spu-blue font-bold transition-all hover:bg-slate-50 hover:shadow-lg">
                <i class="fas fa-arrow-right rtl:rotate-180 rotate-0"></i>
                <span x-text="$store.app.currentLang === 'ar' ? 'العودة إلى نظرة عامة' : 'Back to Overview'"></span>
            </a>
        </div>
    </div>
</section>
