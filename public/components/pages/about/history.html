<section x-data class="relative py-24 bg-white font-hacen overflow-hidden">
    <div class="absolute -left-20 top-1/2 -translate-y-1/2 opacity-[0.03] select-none pointer-events-none">
        <h2 class="text-[20rem] font-bold text-spu-blue leading-none">2005</h2>
    </div>

    <div class="container relative z-10 mx-auto px-6">
        <div class="grid lg:grid-cols-12 gap-12 items-center">

            <div class="lg:col-span-5">
                <div class="relative group">
                    <div
                        class="relative z-10 aspect-[4/5] rounded-[3rem] overflow-hidden border-[12px] border-[#EAF3FF40]">
                        <img src="/images/about/campus-start.jpg" alt="SPU Campus"
                            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                    </div>

                    <div
                        class="absolute -bottom-6 -right-6 z-20 bg-spu-red p-8 rounded-3xl shadow-2xl transform group-hover:scale-110 transition-transform duration-500">
                        <p class="text-white/80 text-xs font-bold uppercase tracking-widest"
                            x-text="$store.app.currentLang === 'ar' ? 'منذ' : 'Since'"></p>
                        <p class="text-white text-4xl font-black mt-1">2005</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 lg:pr-12">
                <div class="inline-flex items-center gap-4 mb-6">
                    <div class="h-px w-12 bg-spu-red"></div>
                    <span class="text-spu-red font-bold uppercase tracking-widest text-sm"
                        x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.eyebrowAr : $store.aboutPage.hero.eyebrowEn"></span>
                </div>

                <h2 class="text-4xl md:text-5xl font-bold text-spu-blue leading-[1.15]"
                    x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.titleAr : $store.aboutPage.hero.titleEn">
                </h2>

                <div class="mt-8 space-y-6 text-lg leading-relaxed text-gray-600">
                    <p
                        x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.summaryAr : $store.aboutPage.hero.summaryEn">
                    </p>

                    <p class="border-r-4 border-spu-blue/10 pr-6 italic"
                        x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.story.bodyAr : $store.aboutPage.story.bodyEn">
                    </p>
                </div>

                <div class="mt-12">
                    <button
                        class="group flex items-center gap-4 text-spu-blue font-bold hover:text-spu-red transition-colors">
                        <span
                            x-text="$store.app.currentLang === 'ar' ? 'اكتشف المزيد عن رحلتنا' : 'Learn more about our journey'"></span>
                        <div
                            class="flex items-center justify-center w-10 h-10 rounded-full border border-spu-blue/20 group-hover:border-spu-red group-hover:bg-spu-red group-hover:text-white transition-all">
                            <svg class="w-5 h-5 rtl:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 8l4 4m0 0l-4 4m4-4H3" />
                            </svg>
                        </div>
                    </button>
                </div>
            </div>

        </div>
    </div>
</section>
