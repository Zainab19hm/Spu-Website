<section id="history" x-data="{ 
    isDown: false, 
    startX: 0, 
    scrollLeft: 0,
    init() {
        const slider = this.$refs.slider;
        slider.addEventListener('mousedown', (e) => {
            this.isDown = true;
            slider.classList.add('active');
            this.startX = e.pageX - slider.offsetLeft;
            this.scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => {
            this.isDown = false;
        });
        slider.addEventListener('mouseup', () => {
            this.isDown = false;
        });
        slider.addEventListener('mousemove', (e) => {
            if(!this.isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - this.startX) * 2;
            slider.scrollLeft = this.scrollLeft - walk;
        });
    }
}" class="relative py-16 bg-section font-hacen overflow-hidden">
    <!-- Decorative background elements -->
    <!-- <div class="absolute top-0 right-0 w-1/3 h-full bg-gradient-to-l from-spu-blue/5 to-transparent pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-1/4 h-1/2 bg-gradient-to-tr from-spu-red/5 to-transparent pointer-events-none"></div> -->

    <div class="container relative z-10 mx-auto px-6">
        <div class="text-center max-w-3xl mx-auto mb-16">
            <p class="text-sm font-bold uppercase tracking-[0.3em] text-spu-red"
                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.history.eyebrowAr : $store.aboutPage.history.eyebrowEn">
            </p>
            <h2 class="mt-6 text-4xl md:text-5xl font-bold text-spu-blue leading-tight"
                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.history.titleAr : $store.aboutPage.history.titleEn">
            </h2>
            <p class="mt-6 text-lg text-gray-600 leading-relaxed" translate="no"
                x-html="$store.app.currentLang === 'ar' ? $store.aboutPage.history.summaryAr : $store.aboutPage.history.summaryEn">
            </p>
        </div>

        <!-- Horizontal Timeline Container -->
        <div class="relative mt-20">
            <!-- Scroll indicators/hints -->
            <div class="absolute -top-12 right-0 flex gap-2 text-spu-blue/40 lg:hidden line-indicator">
                <i class="fas fa-arrows-left-right animate-pulse"></i>
                <span class="text-xs font-bold uppercase tracking-wider" x-text="$store.app.currentLang === 'ar' ? 'اسحب للتنقل' : 'Scroll to explore'"></span>
            </div>

            <div class="overflow-x-auto pb-12 snap-x snap-mandatory cursor-grab active:cursor-grabbing hide-scrollbar" x-ref="slider" id="history-scroll-container">
                <div class="inline-flex  flex-nowrap items-start gap-8 md:gap-16 px-[5vw] md:px-[10vw] relative min-w-full">
                    
                    <!-- Horizontal central line -->
                    <div class="absolute left-0 right-0 top-[26px] h-0.5 bg-gradient-to-r from-transparent via-spu-blue/20 to-transparent pointer-events-none"></div>

                    <template x-for="(point, index) in $store.aboutPage.historyPoints" :key="point.year">
                        <div class="snap-center flex-shrink-0 w-[280px] md:w-[380px] group">
                            <!-- Intersection logic / Dot -->
                            <div class="relative flex flex-col justify-between items-center">
                                <div class="w-5 h-5 rounded-full border-4 border-white shadow-lg z-20 transition-all duration-500 bg-spu-blue group-hover:bg-spu-red group-hover:scale-125 mb-8"></div>
                                
                                <!-- Content Card -->
                                <div class="w-full h-[300px] md:h-[350px] bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-2xl shadow-spu-blue/5 transition-all duration-500 group-hover:-translate-y-2 flex flex-col">
                                    <div class="mb-6">
                                        <span class="inline-block px-4 py-1 rounded-full text-sm font-bold transition-colors duration-300 bg-spu-blue/5 text-spu-blue group-hover:bg-spu-red group-hover:text-white"
                                              translate="no" x-html="point.year"></span>
                                    </div>
                                    
                                    <h4 class="text-xl md:text-2xl font-bold text-spu-blue mb-4 group-hover:text-spu-red transition-colors duration-300"
                                        x-text="$store.app.currentLang === 'ar' ? point.titleAr : point.titleEn"></h4>
                                    
                                    <p class="text-gray-500 leading-relaxed text-sm md:text-base line-clamp-4 lg:line-clamp-none overflow-y-auto"
                                       x-html="$store.app.currentLang === 'ar' ? point.descAr : point.descEn"></p>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
