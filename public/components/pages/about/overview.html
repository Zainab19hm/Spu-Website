<section id="about-dynamic-section" x-data class="relative py-24 overflow-hidden bg-white font-hacen">
    <div class="container relative z-10 mt-14">

        <div class="flex flex-col lg:flex-row justify-between items-start gap-10">
            <h2 class="text-5xl md:text-7xl mb-5 font-black text-spu-blue tracking-tighter uppercase"
                x-init="if($store.app.currentLang === 'en') { $el.innerHTML = 'ABOUT SP<span class=\'text-spu-red\'>U</span>'; }">
                <span x-show="$store.app.currentLang === 'ar'" x-text="'عن الجامعة'"></span>
            </h2>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 ">

            <div class="lg:col-span-5 flex flex-col gap-6 relative reveal-left z-20" x-init="observeElement($el)">
                <!-- Top Image -->
                <div class="w-[448px] h-[411px]   overflow-hidden  shadow-xl relative z-10">
                    <img :src="$store.aboutPage.hero.image1" class="w-full h-full object-cover">
                    <!-- do an overlay -->
                    <div class="overlay bg-spu-blue/40 absolute w-full h-full top-0 left-0"></div>
                </div>

                <!-- Bottom Image -->
                <div class="w-[448px] h-[411px]  overflow-hidden  shadow-xl relative z-10">
                    <img :src="$store.aboutPage.hero.image2" class="w-full h-full object-cover">
                    <div class="overlay bg-spu-blue/40 absolute w-full h-full top-0 left-0"></div>

                </div>

                <!-- Overlapping Blue Box -->
                <div
                    class="absolute top-1/2 left-3/5 -translate-x-[20%] -translate-y-1/2 z-50 bg-spu-blue rounded-sm h-[276px] w-[396px] border-[6px] border-white shadow-2xl flex items-center justify-center p-10 text-white text-center  hidden md:flex">
                    <p class="text-2xl font-bold leading-tight"
                        x-text="$store.app.currentLang === 'ar' ? 'قيم جوهرية تلتزم بها الجامعة' : 'A core value upheld by the university'">
                    </p>
                </div>

                <div
                    class="w-[211px] h-[700px] bg-transparent  z-40 border-[5px] border-white/60  absolute top-[67px] left-[20%]">
                </div>
            </div>

            <div class="lg:col-span-7 flex flex-col justify-center reveal-right" x-init="observeElement($el)">
                <!-- Bold Intro Statement -->
                <div class="mb-12 lg:pl-12">
                    <p class="text-[30px] font-bold text-black/90 leading-[100%] w-full"
                        x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.titleAr : $store.aboutPage.hero.titleEn">
                    </p>
                </div>

                <!-- Vision & Mission Cards -->
                <div class="space-y-0 lg:pl-12">
                    <template x-for="(item, index) in $store.aboutPage.story.items" :key="item.id">
                        <div class="py-12 px-10 group transition-all duration-500 "
                            :class="index % 2 === 0 ? 'bg-section' : 'bg-white'">
                            <h3 class="text-2xl font-bold text-spu-blue mb-4 flex items-center gap-3">
                                <span x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></span>
                            </h3>
                            <p class="text-[17px] text-slate-600 leading-relaxed max-w-2xl"
                                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.story[item.keyAr] : $store.aboutPage.story[item.keyEn]">
                            </p>
                        </div>
                    </template>
                </div>

                <div class="grid grid-cols-2 gap-6 pt-4 lg:pl-12 bg-section">
                    <div class="flex items-start gap-3">
                        <img src="/images/icon-check-circle-outline.svg" class="w-5 h-5 text-spu-red mt-1" alt="Check">
                        <div>
                            <h4 class="font-bold text-spu-blue"
                                x-text="$store.app.currentLang === 'ar' ? 'اعتماد دولي' : 'Global Accreditation'"></h4>
                            <p class="text-sm text-slate-500"
                                x-text="$store.app.currentLang === 'ar' ? 'شهادات معترف بها عالمياً' : 'Degrees recognized globally'">
                            </p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <img src="/images/icon-check-circle-outline.svg" class="w-5 h-5 text-spu-red mt-1" alt="Check">
                        <div>
                            <h4 class="font-bold text-spu-blue"
                                x-text="$store.app.currentLang === 'ar' ? 'جاهزية مهنية' : 'Career Readiness'"></h4>
                            <p class="text-sm text-slate-500"
                                x-text="$store.app.currentLang === 'ar' ? 'تأهيل كامل لسوق العمل' : 'Prepared for job market'">
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

     <!-- Closing main container for grid -->

    <!-- ! Stats Section: Full width dark bar -->
    <div x-data="{ hasCounted: false }"
        x-init="const obs = new IntersectionObserver(e => { if(e[0].isIntersecting && !hasCounted) { $store.aboutPage.startCounting(); hasCounted = true; } }, {threshold: 0.5}); obs.observe($el);"
        class="bg-spu-blue   text-white shadow-2xl relative">

        <div class="">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-0 relative z-10">
                <template x-for="(stat, index) in $store.aboutPage.quickStats" :key="stat.id">
                    <div class="text-center group py-8"
                        :class="index !== $store.aboutPage.quickStats.length - 1 ? 'border-r border-white/10' : ''">
                        <img :src="stat.icon"
                            class="w-8 h-8 mb-6 mx-auto brightness-0 invert opacity-60 group-hover:opacity-100 transition-all duration-300"
                            alt="Stat Icon">
                        <div class="text-6xl font-black mb-3 flex items-center justify-center tracking-tighter">
                            <span translate="no" x-text="stat.current"></span>
                            <span class="text-white" x-show="stat.id === 'papers'">+</span>
                        </div>
                        <p class="text-xs font-bold uppercase tracking-[0.2em] text-white/40 group-hover:text-white/70 transition-colors"
                            x-text="$store.app.currentLang === 'ar' ? stat.labelAr : stat.labelEn"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div class="container relative z-10"> <!-- Restart container for bottom section -->

        <div class="mt-32 relative group overflow-hidden">
            <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-20">

                <div class="w-full lg:w-1/2 relative reveal-left" x-init="$nextTick(() => { 
                                const obs = new IntersectionObserver(entries => {
                                    if(entries[0].isIntersecting) { $el.classList.add('active'); obs.disconnect(); }
                                }, { threshold: 0.1 });
                                obs.observe($el);
                             })">

                    <div
                        class="absolute -top-4 -right-4 w-full h-full border-2 border-spu-red rounded-[3rem] transition-transform duration-500 group-hover:translate-x-2 group-hover:-translate-y-2">
                    </div>

                    <div class="relative h-[400px] md:h-[500px] rounded-[3rem] overflow-hidden ">
                        <img :src="$store.aboutPage.hero.image"
                            class="w-full h-full object-cover transition-transform duration-1000 "
                            alt="University Life">
                        <div class="absolute inset-0 bg-gradient-to-t from-spu-blue/60 via-transparent to-transparent">
                        </div>
                    </div>
                </div>

                <div class="w-full lg:w-1/2 reveal-right"
                    :class="$store.app.currentLang === 'ar' ? 'text-right' : 'text-left'" x-init="$nextTick(() => { 
                                const obs = new IntersectionObserver(entries => {
                                    if(entries[0].isIntersecting) { $el.classList.add('active'); obs.disconnect(); }
                                }, { threshold: 0.1 });
                                obs.observe($el);
                             })">

                    <div class="inline-flex items-center gap-3 mb-6">
                        <div class="h-[2px] w-12 bg-spu-red"></div>
                        <img src="/images/icon-award-outline.svg" class="w-5 h-5 text-spu-red" alt="Award">
                        <span class="text-spu-red font-black tracking-widest text-sm uppercase"
                            x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.badgeAr : $store.aboutPage.hero.badgeEn"></span>
                    </div>

                    <h3 class="text-3xl md:text-4xl font-bold text-spu-blue mb-8 leading-tight"
                        x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.titleAr : $store.aboutPage.hero.titleEn">
                    </h3>

                    <div class="space-y-6">
                        <p class="text-xl text-slate-600 leading-relaxed italic border-r-4 border-spu-blue/10 pr-6"
                            x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.quoteAr : $store.aboutPage.hero.quoteEn">
                        </p>
                        <p class="text-lg text-slate-500 leading-relaxed"
                            x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.hero.descriptionAr : $store.aboutPage.hero.descriptionEn">
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
