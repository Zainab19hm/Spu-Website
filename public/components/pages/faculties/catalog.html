<section id="catalog" x-data class="bg-white py-20 font-hacen lg:py-24">
    <div class="container">
        <div class="max-w-3xl">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? 'دليل الكليات' : 'Faculty Catalogue'"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight text-spu-blue md:text-4xl" x-text="$store.app.currentLang === 'ar' ? 'استكشف مجالات الدراسة في SPU' : 'Explore the study areas offered at SPU'"></h2>
        </div>

        <div class="mt-10 grid gap-6 lg:grid-cols-2 xl:grid-cols-3">
            <template x-for="faculty in $store.faculties.items" :key="faculty.id">
                <article :id="`faculty-${faculty.id}`" class="rounded-[30px] border border-slate-200/80 bg-white p-7 shadow-[0_24px_60px_rgba(20,30,70,0.08)] transition-transform duration-300 hover:-translate-y-1">
                    <div class="flex items-start justify-between gap-5">
                        <div>
                            <span class="inline-flex rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.24em] text-white" :style="`background-color:${faculty.color}`" x-html="$store.app.currentLang === 'ar' ? faculty.yearsAr : faculty.yearsEn"></span>
                            <h3 class="mt-5 text-2xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? faculty.nameAr : faculty.nameEn"></h3>
                        </div>
                        <img :src="faculty.logo" :alt="$store.app.currentLang === 'ar' ? faculty.nameAr : faculty.nameEn" class="h-18 w-18 object-contain" :class="faculty.imgClass || ''">
                    </div>

                    <p class="mt-6 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? faculty.summaryAr : faculty.summaryEn"></p>

                    <div class="mt-6 rounded-[22px] bg-section p-5">
                        <p class="text-sm font-bold uppercase tracking-[0.24em] text-spu-blue/70" x-text="$store.app.currentLang === 'ar' ? 'التركيز' : 'Focus'"></p>
                        <p class="mt-3 text-[15px] leading-7 text-slate-700" x-text="$store.app.currentLang === 'ar' ? faculty.focusAr : faculty.focusEn"></p>
                    </div>
                </article>
            </template>
        </div>
    </div>
</section>
