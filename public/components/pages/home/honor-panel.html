<section x-data="honorAdvancedSlider()"
    class="honor-slider-section py-16 bg-[#f8f9fa] font-hacen overflow-hidden relative">
    <!-- ! Removed redundant x-init to prevent double-initialization -->

    <div class="container">
        <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div class="reveal">
                <p class="text-spu-red font-bold tracking-[0.3em] text-xs uppercase mb-3"
                    x-text="$store.app.currentLang === 'ar' ? 'سجل التميز' : 'Record of Excellence'"></p>
                <h2 class="text-4xl md:text-5xl font-bold text-spu-blue leading-tight"
                    x-text="$store.app.currentLang === 'ar' ? 'لوحة الشرف الجامعية' : 'University Honor Panel'"></h2>
            </div>

            <div class="w-48 h-1.5 bg-slate-200 rounded-full overflow-hidden transition-opacity duration-300"
                :class="hoveredItem ? 'opacity-0' : 'opacity-100'">
                <div class="h-full bg-spu-red transition-all duration-[5000ms] ease-linear"
                    :style="{ width: progress + '%' }"></div>
            </div>
        </div>

        <div class="relative h-[550px] md:h-[650px] w-full mt-10">
            <template x-for="(item, index) in allData" :key="item.id">
                <div class="honor-slide-slot absolute transition-all duration-1000 ease-in-out"
                    :class="getSlotClass(index)" @mouseenter="isHoverable(index) ? setHover(item) : null"
                    @mouseleave="clearHover()" @click="isFeatured(item) ? window.location.href = item.link : null">
                    <!-- ! Added click handler to make featured slide clickable -->

                    <div
                        class="relative w-full h-full overflow-hidden rounded-[2.5rem] shadow-2xl group cursor-pointer">
                        <img :src="item.image"
                            class="absolute inset-0 w-full h-full object-cover transition-transform duration-[2s]"
                            :class="isFeatured(item) ? 'scale-110 brightness-110' : 'scale-100 brightness-75'">

                        <div class="absolute inset-0 bg-gradient-to-t from-spu-blue/95 via-spu-blue/40 to-transparent transition-opacity duration-700"
                            :class="isFeatured(item) ? 'opacity-100' : 'opacity-40'">
                        </div>

                        <div class="absolute inset-0 p-8 md:p-12 flex flex-col justify-end text-white"
                            x-show="isFeatured(item)" x-transition:enter="transition delay-300 duration-500 ease-out"
                            x-transition:enter-start="opacity-0 translate-y-10"
                            x-transition:enter-end="opacity-100 translate-y-0">

                            <span
                                class="inline-block bg-spu-red px-4 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest mb-4 w-fit"
                                x-text="$store.app.currentLang === 'ar' ? item.badgeAr : item.badgeEn"></span>

                            <h3 class="text-3xl md:text-5xl font-bold mb-5 leading-tight drop-shadow-lg"
                                x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>

                            <p class="text-white/80 max-w-xl text-lg mb-8 line-clamp-2"
                                x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>

                            <a :href="item.link" class="flex items-center gap-3 font-bold group/link w-fit">
                                <span
                                    class="border-b-2 border-white/30 group-hover/link:border-white transition-colors pb-1"
                                    x-text="$store.app.currentLang === 'ar' ? 'استكشف الإنجاز' : 'Explore Achievement'"></span>
                                <i :class="$store.app.currentLang === 'ar' ? 'fa-arrow-left group-hover/link:-translate-x-2' : 'fa-arrow-right group-hover/link:translate-x-2'"
                                    class="fas transition-transform"></i>
                                <!-- ! Cleaned up stray character to fix icon rendering -->
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</section>

<script>
    function honorAdvancedSlider() {
        return {
            allData: [],
            offset: 0,
            progress: 0,
            hoveredItem: null,
            timer: null,

            init() { 
                const sync = () => { 
                    const items = this.$store.honorPanel?.items || [];
                    if (items.length > 0) {
                        // Ensure we have enough items (at least 5) to allow smooth rotation across all stages
                        let dataArr = [...items];
                        if (dataArr.length < 5) {
                            dataArr = [...dataArr, ...dataArr.map(i => ({...i, id: 'clone_' + i.id}))];
                        }
                        this.allData = dataArr; 
                        this.offset = 0;
                        if (!this.timer) this.startTimer(); 
                    }
                };
                sync();
                this.$watch('$store.honorPanel.items', () => sync());
            },

            startTimer() {
                this.stopTimer();
                this.progress = 0;
                setTimeout(() => this.progress = 100, 50);

                this.timer = setInterval(() => {
                    if (!this.hoveredItem) {
                        this.rotate();
                    }
                }, 5000);
            },

            stopTimer() {
                if (this.timer) clearInterval(this.timer);
            },

            rotate() {
                if (this.allData.length < 2) return;
                this.progress = 0;
                this.offset = (this.offset + 1) % this.allData.length;
                setTimeout(() => this.progress = 100, 50);
            },

            setHover(item) {
                this.hoveredItem = item;
                this.progress = 0;
            },

            clearHover() {
                this.hoveredItem = null;
                this.progress = 0;
                setTimeout(() => this.progress = 100, 50);
            },

            isFeatured(item) {
                if (this.hoveredItem) return item.id === this.hoveredItem.id;
                if (this.allData.length === 0) return false;
                const featuredIndex = this.offset % this.allData.length;
                return item.id === this.allData[featuredIndex].id;
            },
            
            isHoverable(index) {
                if (this.allData.length === 0) return false;
                const vIndex = (index - this.offset + this.allData.length) % this.allData.length;
                return vIndex === 1 || vIndex === 2;
            },

            getSlotClass(index) {
                if (!this.allData[index]) return 'slot-hidden';
                
                const vIndex = (index - this.offset + this.allData.length) % this.allData.length;

                let baseClass = '';
                if (vIndex === 0) baseClass = 'slot-featured';
                else if (vIndex === 1) baseClass = 'slot-top-right';
                else if (vIndex === 2) baseClass = 'slot-bottom-right';
                else if (vIndex === this.allData.length - 1) baseClass = 'slot-out-left';
                else baseClass = 'slot-hidden';

                if (this.hoveredItem) {
                    if (this.allData[index].id === this.hoveredItem.id) {
                        return 'slot-featured-active';
                    }
                    if (vIndex < 3) {
                        return baseClass + ' slot-thumbnail-dimmed';
                    }
                }
                
                return baseClass;
            }
        }
    }
</script>
