<section x-data="{
    activeIndex: 0,
    timer: null,
    items: [],
    init() {
        this.items = $store.honorPanel.items || [];
        this.startAuto();
    },
    startAuto() {
        this.stopAuto();
        this.timer = setInterval(() => this.next(), 5000);
    },
    stopAuto() {
        if (this.timer) clearInterval(this.timer);
    },
    next() {
        if(this.items.length > 0) {
            this.activeIndex = (this.activeIndex + 1) % this.items.length;
        }
    },
    prev() {
        if(this.items.length > 0) {
            this.activeIndex = (this.activeIndex - 1 + this.items.length) % this.items.length;
        }
    },
    handleManual(action, val) {
        this.stopAuto();
        if (action === 'next') this.next();
        if (action === 'prev') this.prev();
        if (action === 'goto') this.activeIndex = val;
        setTimeout(() => this.startAuto(), 8000);
    },
    getPos(index) {
        if(!this.items.length) return 0;
        return (index - this.activeIndex + this.items.length) % this.items.length;
    }
}" class="py-16 bg-white font-hacen relative overflow-hidden reveal">
    <div class="container ">
        <div class="flex items-end justify-between mb-12">
            <div>
                <p class="text-spu-red font-bold tracking-widest text-xs uppercase mb-2"
                    x-text="$store.app.currentLang === 'ar' ? 'سجل التميز' : 'Honor Board'"></p>
                <h2 class="text-3xl lg:text-4xl font-bold text-spu-blue">
                    <span x-text="$store.app.currentLang === 'ar' ? 'التكريم والتميز' : 'Honor & Excellence'"></span>
                </h2>
            </div>

            <div class="flex gap-3">
                <button @click="handleManual('prev')" type="button"
                    class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-all">
                    <img src="/images/icon-chevron-left-outline.svg" class="w-4 h-4" :class="$store.app.currentLang === 'ar' ? 'rotate-180' : ''" alt="Prev">
                </button>
                <button @click="handleManual('next')" type="button"
                    class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-all">
                    <img src="/images/icon-chevron-right-outline.svg" class="w-4 h-4" :class="$store.app.currentLang === 'ar' ? 'rotate-180' : ''" alt="Next">
                </button>
            </div>
        </div>

        <div class="relative h-[500px] w-full">
            <template x-for="(item, index) in items" :key="item.id">
                <div class="absolute transition-all duration-1000 [transition-timing-function:cubic-bezier(0.34,1.56,0.64,1)] rounded-[40px] overflow-hidden group"
                    :class="{
                        'w-full lg:w-[65%] h-full z-30 left-0 top-0 opacity-100 shadow-2xl scale-100': getPos(index) === 0,
                        'w-0 lg:w-[32%] h-[48%] z-20 left-0 lg:left-[68%] top-0 opacity-0 lg:opacity-100 scale-95 brightness-90': getPos(index) === 1,
                        'w-0 lg:w-[32%] h-[48%] z-10 left-0 lg:left-[68%] top-[52%] opacity-0 lg:opacity-100 scale-90 brightness-75': getPos(index) === 2
                    }">

                    <img :src="item.image"
                        class="absolute inset-0 w-full h-full object-cover transition-transform duration-[2000ms] group-hover:scale-110">

                    <div x-show="getPos(index) === 0" x-transition:enter="transition ease-out duration-700 delay-400"
                        x-transition:enter-start="opacity-0 translate-y-12"
                        x-transition:enter-end="opacity-100 translate-y-0"
                        class="absolute inset-0 bg-gradient-to-t from-spu-blue/95 via-spu-blue/40 to-transparent flex flex-col justify-end p-10 text-white">

                        <div class="flex items-center gap-3 mb-4">
                            <span class="px-4 py-1 rounded-full bg-spu-red text-[10px] font-bold uppercase"
                                x-text="$store.app.currentLang === 'ar' ? item.badgeAr : item.badgeEn"></span>
                            <span class="text-white/70 text-sm"
                                x-text="$store.app.currentLang === 'ar' ? item.metaAr : item.metaEn"></span>
                        </div>
                        <h3 class="text-2xl lg:text-4xl font-bold mb-4"
                            x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                        <p class="text-white/80 leading-relaxed mb-6 line-clamp-2"
                            x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>

                        <a :href="item.link" class="inline-flex items-center gap-3 font-bold group/link">
                            <span class="border-b-2 border-spu-red pb-1"
                                x-text="$store.app.currentLang === 'ar' ? 'اكتشف التفاصيل' : 'View Details'"></span>
                            <img src="/images/icon-arrow-right-outline.svg" class="w-4 h-4 brightness-0 invert transition-transform group-hover/link:translate-x-2" :class="$store.app.currentLang === 'ar' ? 'rotate-180' : ''" alt="Details">
                        </a>
                    </div>

                    <div x-show="getPos(index) !== 0"
                        class="absolute inset-0 bg-black/30 hover:bg-black/10 transition-colors cursor-pointer"
                        @click="handleManual('goto', index)"></div>
                </div>
            </template>
        </div>

        <div class="flex justify-center gap-3 mt-10">
            <template x-for="(item, index) in items" :key="'dot-'+item.id">
                <button @click="handleManual('goto', index)" class="h-2 rounded-full transition-all duration-700"
                    :class="activeIndex === index ? 'w-10 bg-spu-red' : 'w-2 bg-slate-200'"></button>
            </template>
        </div>
    </div>
</section>
