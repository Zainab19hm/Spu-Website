<section id="home-news"
    x-data="{ visible: false, init() { const observer = new IntersectionObserver(entries => { if (entries[0].isIntersecting) { this.visible = true; observer.disconnect(); } }, { threshold: 0.15 }); observer.observe(this.$el); } }"
    class="py-7.5 mt-[70px] bg-white font-hacen overflow-hidden reveal">
    <div class="container">

        <div class="flex items-center justify-between mb-10">
            <h2 class="text-[42px] font-bold text-[#1e2652] tracking-tight">
                <span x-text="$store.app.currentLang === 'ar' ? 'أخبار الجامعة' : 'SPU News'"></span>
            </h2>

            <div class="flex items-center gap-6">
                <a href="/news.html" ! Fixed View All link to navigate to news page
                    class="bg-[#1e2652] text-white px-6 py-2 rounded-md text-sm font-bold flex items-center gap-3 hover:bg-opacity-90 transition-all">
                    <span x-text="$store.app.ui.viewAll[$store.app.currentLang]"></span>
                    <i class="fas fa-chevron-right text-[10px]"></i>
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8 pb-10 md:grid-cols-2 xl:grid-cols-4">
            <template x-for="item in $store.news.items.slice(0, 4)" :key="item.id">
                <div
                    class="reveal-item w-full bg-white rounded-[25px] shadow-[0_15px_35px_rgba(0,0,0,0.06)] overflow-hidden flex flex-col group cursor-pointer transition-all duration-500 ease-out hover:-translate-y-2 hover:shadow-[0_25px_60px_rgba(0,0,0,0.12)]">

                    <div class="relative h-[210px] overflow-hidden">
                        <img :src="item.image" :alt="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"
                            class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-110">
                        <div class="absolute top-4 left-4 px-4 py-1 rounded-md text-white text-[11px] font-bold z-10"
                            :class="item.categoryColor" x-text="item.category"></div>
                        <div
                            class="absolute bottom-0 left-0 w-full h-[3px] bg-spu-red opacity-80 z-10 transition-transform duration-500 group-hover:scale-x-110">
                        </div>
                    </div>

                    <div class="p-6 text-center flex flex-col flex-1">
                        <h3 class="text-[22px] font-bold text-black mb-1 leading-tight"
                            x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>

                        <p class="text-spu-red text-[15px] mb-3" translate="no" x-html="item.date"></p>

                        <p class="text-gray-700 text-[14px] leading-[1.6] line-clamp-3"
                            x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>
</section>
