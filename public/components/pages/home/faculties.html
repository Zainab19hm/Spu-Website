<section x-data="{
        slideFaculties(direction) {
            const track = this.$refs.facultiesTrack;
            if (!track) return;
            const firstCard = track.querySelector('.faculty-card');
            const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 292;
            const gap = 24;
            const step = Math.round(cardWidth + gap);
            track.scrollBy({ left: direction === 'right' ? step : -step, behavior: 'smooth' });
        }
    }" class="mt-[120px] bg-white font-hacen relative overflow-hidden">
    <div class="container relative">
        <div class="flex flex-col md:flex-row items-center gap-[52px] relative">

            <div
                class="w-full relative md:w-[322px] h-[435px] text-center bg-[#1e2652] rounded-[24px] flex flex-col justify-center items-start text-white shrink-0 overflow-hidden group z-20 shadow-[0_30px_80px_rgba(17,26,63,0.18)]">
                <div class="absolute inset-0 opacity-[0.15] z-0 animate-slow-pan"
                    style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 30px 30px;">
                </div>
                <div class="relative z-10 w-full px-6 flex flex-col h-full justify-center text-right">
                    <h2
                        class="text-[45px] text-center w-full font-bold leading-tight mb-12 transition-all duration-500">
                        <span x-text="$store.app.currentLang === 'ar' ? 'كلياتنا' : 'Our'"></span>
                        <br>
                        <span class="text-spu-red brightness-150"
                            x-text="$store.app.currentLang === 'ar' ? 'الجامعية' : 'Faculties'"></span>
                    </h2>
                    <a href="/faculties.html"
                        class="bg-white mx-auto absolute inset-x-0 bottom-10 w-[195px] h-[40px] text-spu-blue justify-center rounded-[10px] font-bold text-[16px] flex items-center gap-2 hover:bg-gray-100 transition-all shadow-lg group/btn overflow-hidden">
                        <span x-text="$store.app.ui.viewAll[$store.app.currentLang]"></span>
                        <i
                            :class="[$store.app.currentLang === 'ar' ? 'fas fa-arrow-left' : 'fas fa-arrow-right', $store.app.currentLang === 'ar' ? 'group-hover:-translate-x-1' : 'group-hover:translate-x-1']"
                            class="text-[10px] opacity-90 transition-transform"></i>
                    </a>
                </div>
            </div>

            <div class="flex-1 min-w-0 w-full relative">
                <div class="slider-controls-row slider-controls-row--top">
                    <button @click="slideFaculties('left')" type="button" class="slider-nav-btn slider-nav-btn--prev" aria-label="Previous">
                        <i :class="$store.app.currentLang === 'ar' ? 'fas fa-chevron-right' : 'fas fa-chevron-left'" class="text-[14px]"></i>
                    </button>
                    <button @click="slideFaculties('right')" type="button" class="slider-nav-btn slider-nav-btn--next" aria-label="Next">
                        <i :class="$store.app.currentLang === 'ar' ? 'fas fa-chevron-left' : 'fas fa-chevron-right'" class="text-[14px]"></i>
                    </button>
                </div>

                <div x-ref="facultiesTrack"
                    class="flex h-[390px] w-full snap-x snap-mandatory flex-nowrap gap-6 bg-transparent overflow-x-auto overflow-y-hidden no-scrollbar scroll-smooth overscroll-x-contain px-2 pt-2 pb-5 items-start z-10">

                    <template x-for="faculty in $store.faculties.items" :key="faculty.id">
                        <div :id="'faculty-' + faculty.id" @mouseenter="$store.faculties.activeFaculty = faculty.id" !
                            // ! Added ID for external anchor links @mouseleave="$store.faculties.activeFaculty = null"
                            :class="{ 
                                'opacity-50 grayscale-[0.2]': $store.faculties.activeFaculty !== null && $store.faculties.activeFaculty !== faculty.id,
                                'opacity-100 scale-[1.02] z-20 shadow-2xl border-transparent': $store.faculties.activeFaculty === faculty.id,
                                'opacity-100': $store.faculties.activeFaculty === null
                            }"
                            class="faculty-card snap-start w-[292px] h-[380px] hover:cursor-pointer shrink-0 relative bg-white rounded-[24px] border border-gray-100 shadow-[0_10px_30px_rgba(0,0,0,0.03)] flex flex-col items-center text-center transition-all duration-300 group overflow-hidden">

                            <div class="absolute top-0 left-0 w-full h-0 group-hover:h-[6px] z-50 transition-all duration-300 ease-in-out"
                                :style="'background-color:' + faculty.color"></div>

                            <div class="relative w-[160px] h-[160px] mt-6 mb-4 flex items-center justify-center">
                                <img :src="faculty.logo" :class="faculty.imgClass"
                                    class="relative z-10 w-[110px] h-[110px] object-contain transition-transform duration-500 ">
                            </div>

                            <div class="px-4 mb-4">
                                <h3 class="text-[20px] font-bold leading-tight transition-colors duration-300 text-gray-800"
                                    x-text="$store.app.currentLang === 'ar' ? faculty.nameAr : faculty.nameEn"></h3>
                            </div>

                            <div class="px-6 py-1.5 rounded-full text-white font-bold text-[12px] mb-6 shadow-sm transition-transform duration-300 group-hover:scale-105"
                                :style="'background-color:' + faculty.color"
                                x-html="$store.app.currentLang === 'ar' ? faculty.yearsAr : faculty.yearsEn">
                            </div>

                            <a :href="'/faculties.html#faculty-' + faculty.id" ! // ! Linked card directly to faculty
                                section
                                class="mt-auto mb-6 flex items-center gap-2 text-[13px] font-extrabold transition-all duration-300 group-hover:gap-3"
                                :style="'color:' + faculty.color">
                                <span x-text="$store.app.ui.learnMore[$store.app.currentLang]"></span>
                                <i
                                    :class="[$store.app.currentLang === 'ar' ? 'fas fa-arrow-left' : 'fas fa-arrow-right', $store.app.currentLang === 'ar' ? 'group-hover:-translate-x-1' : 'group-hover:translate-x-1']"
                                    class="text-[10px] opacity-50 group-hover:opacity-100 transition-transform"></i>
                            </a>
                        </div>
                    </template>
                </div>
            </div>
        </div>

    </div>
</section>
