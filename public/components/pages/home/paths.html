<section id="home-paths"
    x-data="{
        slidePaths(direction) {
            const track = this.$refs.pathsTrack;
            if (!track) return;

            const firstCard = track.querySelector('.path-card');
            const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 292;
            const gap = 24;
            const step = Math.round(cardWidth + gap);
            track.scrollBy({ left: direction === 'right' ? step : -step, behavior: 'smooth' });
        },
        isVisible: false
    }"
    class="py-7.5 mt-[70px] relative font-hacen reveal"
    style="background-color: #EAF3FF40;"
    x-init="(() => { const observer = new IntersectionObserver(entries => { if (entries[0].isIntersecting) { isVisible = true; observer.disconnect(); } }, { threshold: 0.15 }); observer.observe($el); })()">
 
    <div class="container relative">
        <div class="flex flex-col md:flex-row items-center gap-[52px] relative">
            <div class="w-full relative md:w-[322px] h-[435px] text-center bg-[#1e2652] rounded-[24px] flex flex-col justify-center items-start text-white shrink-0 overflow-hidden group shadow-[0_30px_80px_rgba(17,26,63,0.18)] z-20">
                <div class="absolute inset-0 opacity-[0.15] z-0 animate-slow-pan" style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 30px 30px;"></div>

                <div class="relative z-10 w-full px-6 flex flex-col h-full justify-center text-right">
                    <h2 class="text-[45px] text-center w-full font-bold leading-tight mb-12 transition-all duration-500">
                        <span x-text="$store.app.currentLang === 'ar' ? 'اختر' : 'Choose'"></span>
                        <br>
                        <span class="text-spu-red brightness-150" x-text="$store.app.currentLang === 'ar' ? 'مسارك' : 'Your Path'"></span>
                    </h2>
                    <a href="#"
                        class="bg-white mx-auto absolute inset-x-0 bottom-10 w-[195px] h-[40px] text-spu-blue justify-center rounded-[10px] font-bold text-[16px] flex items-center gap-2 hover:bg-gray-100 transition-all shadow-lg group/btn overflow-hidden">
                        <span x-text="$store.app.ui.explore[$store.app.currentLang]"></span>
                        <i class="fas fa-arrow-right text-[10px] transition-transform group-hover/btn:translate-x-1"></i>
                    </a>
                </div>
            </div>

            <div class="flex-1 min-w-0 w-full relative">
                <div
                    x-ref="pathsTrack"
                    class="flex h-[390px] w-full snap-x snap-mandatory flex-nowrap gap-6 bg-transparent overflow-x-auto overflow-y-hidden no-scrollbar scroll-smooth overscroll-x-contain px-2 pt-2 pb-5 items-start z-10"
                >
                    <template x-for="path in $store.paths.items" :key="path.id">
                        <div
                            class="reveal-item path-card snap-start w-[292px] h-[380px] hover:cursor-pointer shrink-0 relative rounded-[28px] border border-white/70 bg-white shadow-[0_15px_35px_rgba(20,30,70,0.06)] backdrop-blur-xl transition-all duration-300 ease-in-out group overflow-hidden flex flex-col p-6"
                            @mouseenter="$store.paths.activePath = path.id"
                            @mouseleave="$store.paths.activePath = null"
                            :class="{
                                'opacity-50 grayscale-[0.2]': $store.paths.activePath !== null && $store.paths.activePath !== path.id,
                                '!bg-[#1e2652] !text-white z-20 !border-transparent shadow-2xl': $store.paths.activePath === path.id,
                                'opacity-100 bg-white text-gray-800 border-gray-100': $store.paths.activePath === null || $store.paths.activePath === path.id
                            }"
                        >
                            <div class="absolute inset-x-5 top-5 h-16 rounded-[20px] pointer-events-none bg-gradient-to-r from-spu-red/16 via-white/0 to-spu-blue/12 opacity-0 group-hover:opacity-100 transition duration-500"></div>
                            <div class="absolute top-0 left-0 w-full h-0 group-hover:h-[6px] z-50 transition-all duration-300 bg-spu-red"></div>

                            <div
                                class="w-14 h-14 rounded-2xl flex items-center justify-center mb-6 transition-all duration-500 shadow-[0_14px_30px_rgba(20,30,70,0.12)]"
                                :class="$store.paths.activePath === path.id ? 'bg-white/15 text-white shadow-[0_18px_36px_rgba(0,0,0,0.22)]' : 'bg-gray-50 text-spu-blue'"
                            >
                                <span
                                    class="block h-8 w-8 bg-current"
                                    aria-hidden="true"
                                    :style="`-webkit-mask: url('${path.icon}') center / contain no-repeat; mask: url('${path.icon}') center / contain no-repeat;`"
                                ></span>
                            </div>

                            <h3
                                class="text-[22px] font-bold mb-4 leading-tight transition-colors"
                                x-text="$store.app.currentLang === 'ar' ? path.titleAr : path.titleEn"
                            ></h3>

                            <ul class="space-y-3 mb-6 flex-1">
                                <template x-for="link in ($store.app.currentLang === 'ar' ? path.linksAr : path.linksEn)">
                                    <li class="flex items-center gap-2 text-[13px] opacity-60 group-hover:opacity-100 transition-opacity">
                                        <span class="w-1.5 h-1.5 rounded-full bg-current opacity-40"></span>
                                        <span x-text="link"></span>
                                    </li>
                                </template>
                            </ul>

                            <div
                                class="mt-auto flex items-center justify-between text-[13px] font-bold transition-all"
                                :class="$store.paths.activePath === path.id ? 'text-blue-300' : 'text-spu-blue'"
                            >
                                <span x-text="$store.app.ui.learnMore[$store.app.currentLang]"></span>
                                <i class="fas fa-arrow-right text-[12px] transition-transform group-hover:translate-x-2"></i>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4 relative top-[-4px] justify-center lg:justify-end">
            <button
                type="button"
                @click="slidePaths('left')"
                class="slider-nav-btn"
            >
                <i class="fas fa-chevron-left text-sm"></i>
            </button>
            <button
                type="button"
                @click="slidePaths('right')"
                class="slider-nav-btn"
            >
                <i class="fas fa-chevron-right text-sm"></i>
            </button>
        </div>
    </div>
</section>
