<section id="home-paths" x-data="{
        slidePaths(direction) {
            const track = this.$refs.pathsTrack;
            if (!track) return;

            const firstCard = track.querySelector('.path-card');
            const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 292;
            const gap = 24;
            const step = Math.round(cardWidth + gap);
            track.scrollBy({ left: direction === 'right' ? step : -step, behavior: 'smooth' });
        },
        isVisible: false
    }" class="py-8 mt-[70px] relative font-hacen reveal" style="background-color: #EAF3FF40;"
    x-init="(() => { const observer = new IntersectionObserver(entries => { if (entries[0].isIntersecting) { isVisible = true; observer.disconnect(); } }, { threshold: 0.15 }); observer.observe($el); })()">

    <div class="container relative">
        <div class="flex flex-col md:flex-row items-center gap-[52px] relative">
            <div
                class="w-full relative md:w-[322px] h-[435px] text-center bg-[#1e2652] rounded-[24px] flex flex-col justify-center items-start text-white shrink-0 overflow-hidden group shadow-[0_30px_80px_rgba(17,26,63,0.18)] z-20">
                <div class="absolute inset-0 opacity-[0.15] z-0 animate-slow-pan"
                    style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 30px 30px;">
                </div>

                <div class="relative z-10 w-full px-6 flex flex-col h-full justify-center text-right">
                    <h2
                        class="text-[45px] text-center w-full font-bold leading-tight mb-12 transition-all duration-500">
                        <span x-text="$store.app.currentLang === 'ar' ? 'اختر' : 'Choose'"></span>
                        <br>
                        <span class="text-white"
                            x-text="$store.app.currentLang === 'ar' ? 'مسارك' : 'Your Path'"></span>
                    </h2>
                    <a href="#"
                        class="bg-white mx-auto absolute inset-x-0 bottom-10 w-[195px] h-[40px] text-spu-blue justify-center rounded-[10px] font-bold text-[16px] flex items-center gap-2 hover:bg-gray-100 transition-all shadow-lg group/btn overflow-hidden">
                        <span x-text="$store.app.ui.explore[$store.app.currentLang]"></span>
                        <img src="/images/icon-arrow-right-outline.svg"
                            class="w-2.5 h-2.5 mt-2 transition-transform group-hover/btn:translate-x-1" alt="Explore">
                    </a>
                </div>
            </div>

            <div class="flex-1 min-w-0 w-full relative">
                <div class="flex gap-3 absolute -top-14 z-50 right-0">
                    <button type="button" @click="slidePaths('left')"
                        class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-all"
                        aria-label="Previous">
                        <img :src="$store.app.currentLang === 'ar' ? '/images/icon-chevron-right-outline.svg' : '/images/icon-chevron-left-outline.svg'"
                            class="w-3.5 h-3.5" alt="Prev">
                    </button>
                    <button type="button" @click="slidePaths('right')"
                        class="w-12 h-12 rounded-full border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-all"
                        aria-label="Next">
                        <img :src="$store.app.currentLang === 'ar' ? '/images/icon-chevron-left-outline.svg' : '/images/icon-chevron-right-outline.svg'"
                            class="w-3.5 h-3.5" alt="Next">
                    </button>
                </div>

                <div x-ref="pathsTrack"
                    class="flex h-[390px] w-full snap-x snap-mandatory flex-nowrap gap-6 bg-transparent overflow-x-auto overflow-y-hidden no-scrollbar scroll-smooth overscroll-x-contain px-2 pt-2 pb-5 items-start z-10">
                    <template x-for="path in $store.paths.items" :key="path.id">
                        <div class="reveal-item path-card snap-start w-[292px] h-[380px] hover:cursor-pointer shrink-0 relative rounded-[28px] border border-gray-100 bg-white shadow-[0_15px_35px_rgba(20,30,70,0.06)] transition-all duration-300 group overflow-hidden"
                            @mouseenter="$store.paths.activePath = path.id" @mouseleave="$store.paths.activePath = null"
                            :class="{
                                'opacity-50 grayscale-[0.2]': $store.paths.activePath !== null && $store.paths.activePath !== path.id,
                                'z-20 shadow-2xl': $store.paths.activePath === path.id
                            }" 
                            <!-- Front Layer: Initial State (Icon + Title) -->
                            <div class="absolute inset-0 bg-white flex flex-col items-center justify-center p-8 transition-transform duration-500 ease-in-out group-hover:-translate-y-full"
                                :class="$store.app.currentLang === 'ar' ? 'text-right' : 'text-left'"> 

                                <div class="absolute top-0 left-0 w-full h-[6px] bg-spu-red"></div>

                                <div
                                    class="w-20 h-20 rounded-2xl bg-slate-50 text-spu-blue flex items-center justify-center mb-8 shadow-sm">
                                    <span class="block h-10 w-10 bg-current" aria-hidden="true"
                                        :style="`-webkit-mask: url('${path.icon}') center / contain no-repeat; mask: url('${path.icon}') center / contain no-repeat;`"></span>
                                </div>

                                <h3 class="text-[26px] font-bold text-[#1e2652] leading-tight text-center"
                                    x-text="$store.app.currentLang === 'ar' ? path.titleAr : path.titleEn"></h3> 
                            </div>

                            <!-- Back Layer: Hover State (List + Footer) -->
                            <div class="absolute inset-0 bg-[#1e2652] text-white p-7 flex flex-col translate-y-full transition-transform duration-500 ease-in-out group-hover:translate-y-0"
                                :class="$store.app.currentLang === 'ar' ? 'text-right' : 'text-left'"> 

                                <h4 class="text-lg font-bold mb-6 opacity-90 border-b border-white/10 pb-2"
                                    x-text="$store.app.currentLang === 'ar' ? path.titleAr : path.titleEn"></h4>

                                <ul class="space-y-4 mb-6 flex-1">
                                    <template
                                        x-for="link in ($store.app.currentLang === 'ar' ? path.linksAr : path.linksEn)">
                                        <li
                                            class="flex items-center gap-3 text-[14px] font-medium opacity-85 hover:opacity-100 transition-opacity">
                                            <span class="w-1.5 h-1.5 rounded-full bg-spu-red"></span> 
                                            <span x-text="link"></span>
                                        </li>
                                    </template>
                                </ul>

                                <div class="mt-auto flex items-center justify-between pt-4 border-t border-white/10"
                                    :class="$store.app.currentLang === 'ar' ? 'flex-row-reverse' : ''">
                                    <span class="text-sm font-bold"
                                        x-text="$store.app.ui.learnMore[$store.app.currentLang]"></span>
                                    <img :src="$store.app.currentLang === 'ar' ? '/images/icon-arrow-left-outline.svg' : '/images/icon-arrow-right-outline.svg'"
                                        class="w-3.5 h-3.5 brightness-0 invert" alt="Arrow"> 
                                       
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

    </div>
</section>
