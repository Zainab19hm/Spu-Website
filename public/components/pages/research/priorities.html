<section id="research-priorities" x-data class="bg-white py-20 font-hacen lg:py-24">
    <div class="container">
        <div class="max-w-3xl">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? 'الأولويات البحثية' : 'Research Priorities'"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight text-spu-blue md:text-4xl" x-text="$store.app.currentLang === 'ar' ? 'محاور بحثية مرتبطة بحاجات المجتمع والمهن' : 'Priority areas linked to community and professional needs'"></h2>
        </div>

        <div class="mt-10 grid gap-6 md:grid-cols-2 xl:grid-cols-4">
            <template x-for="item in $store.researchPage.priorities" :key="item.titleEn">
                <article class="rounded-[28px] border border-slate-200/80 bg-white p-7 shadow-[0_20px_55px_rgba(20,30,70,0.07)]">
                    <h3 class="text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                </article>
            </template>
        </div>
    </div>
</section>
