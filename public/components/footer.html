<!-- 
    SPU OFFICIAL FOOTER
    Professional 4-column footer with integrated Google Maps, contact info, and bilingual support.
-->
<footer class="bg-spu-blue text-white font-hacen pt-16 pb-8 overflow-hidden">
    <div class="container">
        
        <!-- Main Footer Content: 4 Columns -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-12 mb-16">
            
            <!-- Column 1: Identity & Mission -->
            <div class="lg:col-span-4 flex flex-col items-start transition-all duration-500">
                <h2 class="text-[24px] font-bold tracking-wider mb-6 leading-tight uppercase"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.identity.titleAr : $store.footer.identity.titleEn">
                </h2>
                <p class="text-white/70 text-[16px] leading-[1.6] mb-8 max-w-[320px]"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.identity.missionAr : $store.footer.identity.missionEn">
                </p>
                
                <!-- Social Media Icons (from design) -->
                <div class="flex items-center gap-6 text-[22px]">
                    <template x-for="social in $store.footer.identity.socials" :key="social.icon">
                        <a :href="social.url" class="text-white/80 hover:text-spu-red transition-all transform hover:scale-110">
                            <i :class="social.icon"></i>
                        </a>
                    </template>
                </div>
            </div>

            <!-- Column 2: Quick Resources -->
            <div class="lg:col-span-2">
                <h3 class="text-[18px] font-bold mb-8 uppercase tracking-widest text-white/50"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.resources.titleAr : $store.footer.resources.titleEn">
                </h3>
                <ul class="flex flex-col gap-4">
                    <template x-for="link in $store.footer.resources.links" :key="link.labelEn">
                        <li>
                            <a :href="link.url" class="text-white/80 hover:text-white transition-colors text-[16px]"
                                x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn">
                            </a>
                        </li>
                    </template>
                </ul>
            </div>

            <!-- Column 3: Contact Channels -->
            <div class="lg:col-span-3">
                <h3 class="text-[18px] font-bold mb-8 uppercase tracking-widest text-white/50"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.contact.titleAr : $store.footer.contact.titleEn">
                </h3>
                <div class="flex flex-col gap-6">
                    <!-- Address -->
                    <div class="flex items-start gap-4">
                        <i class="fas fa-map-marker-alt mt-1.5 text-spu-red"></i>
                        <span class="text-white/80 text-[15px] leading-relaxed"
                            x-text="$store.app.currentLang === 'ar' ? $store.footer.contact.addressAr : $store.footer.contact.addressEn">
                        </span>
                    </div>
                    <!-- Phone -->
                    <div class="flex items-center gap-4">
                        <i class="fas fa-phone-alt text-spu-red"></i>
                        <span class="text-white/80 text-[15px] ltr" x-text="$store.footer.contact.phone"></span>
                    </div>
                    <!-- Email -->
                    <div class="flex items-center gap-4">
                        <i class="fas fa-envelope text-spu-red"></i>
                        <span class="text-white/80 text-[15px]" x-text="$store.footer.contact.email"></span>
                    </div>
                </div>
            </div>

            <!-- Column 4: Location (Map) -->
            <div class="lg:col-span-3 flex flex-col items-start lg:items-end">
                <h3 class="text-[18px] font-bold mb-8 uppercase tracking-widest text-white/50 w-full text-left"
                    :class="$store.app.currentLang === 'ar' ? 'lg:text-right' : 'lg:text-left'"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.location.titleAr : $store.footer.location.titleEn">
                </h3>
                <!-- Real Google Map Embed -->
                <div class="w-full h-[180px] rounded-[12px] overflow-hidden shadow-2xl border border-white/10 group">
                    <iframe 
                        :src="$store.footer.location.mapUrl" 
                        class="w-full h-full grayscale-[0.3] opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
        </div>

        <!-- Horizontal Divider -->
        <hr class="border-white/10 mb-8">

        <!-- Bottom Copyright Bar -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <!-- Copyright Text -->
            <p class="text-white/50 text-[14px]"
                x-text="$store.app.currentLang === 'ar' ? $store.footer.bottom.copyrightAr : $store.footer.bottom.copyrightEn">
            </p>
            
            <!-- Legal Links -->
            <div class="flex items-center gap-8 text-[14px]">
                <a href="#" class="text-white/50 hover:text-white transition-colors"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.bottom.legalAr : $store.footer.bottom.legalEn"></a>
                <a href="#" class="text-white/50 hover:text-white transition-colors"
                    x-text="$store.app.currentLang === 'ar' ? $store.footer.bottom.cookieAr : $store.footer.bottom.cookieEn"></a>
            </div>
        </div>

    </div>
</footer>
