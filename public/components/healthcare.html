<section 
    x-data="{
        hasCounted: false,
        runCount() {
            if (this.hasCounted) return;
            this.hasCounted = true;
            this.$store.healthcare.startCounting();
        },
        init() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    this.runCount();
                    observer.disconnect();
                }
            }, { threshold: 0.1 });
            observer.observe(this.$refs.statsBanner);
        }
    }"
    class="py-16 bg-section font-hacen overflow-hidden"
>
    <div class="container">
        <!-- Section Title -->
        <h2 class="text-[42px] font-bold text-spu-blue mb-10 text-center lg:text-right">
            SP<span class="text-spu-red">U</span> Healthcare Facilities
        </h2>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">
            
            <!-- Large Card (Left) -->
            <div class="lg:col-span-7 bg-white rounded-[25px] shadow-xl overflow-hidden flex flex-col group hover:shadow-2xl transition-all duration-500">
                <div class="h-[300px] overflow-hidden">
                    <img :src="$store.healthcare.mainCard.image" alt="Healthcare Staff" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                </div>
                <div class="p-8 flex-1">
                    <h3 class="text-[28px] font-bold text-spu-blue mb-4" x-text="$store.healthcare.mainCard.title"></h3>
                    <p class="text-gray-600 text-[16px] leading-relaxed mb-8" x-text="$store.healthcare.mainCard.description"></p>
                    
                    <ul class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <template x-for="feature in ($store.app.currentLang === 'ar' ? $store.healthcare.mainCard.featuresAr : $store.healthcare.mainCard.featuresEn)" :key="feature">
                            <li class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center">
                                    <i class="fas fa-check text-green-600 text-[12px]"></i>
                                </div>
                                <span class="text-spu-blue font-medium" x-text="feature"></span>
                            </li>
                        </template>
                    </ul>

                    <a :href="$store.healthcare.mainCard.link" class="inline-flex items-center justify-center px-10 py-3.5 bg-spu-blue text-white rounded-[12px] font-bold hover:bg-opacity-90 transition-all">
                       <span x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.actionAr : $store.healthcare.mainCard.actionEn"></span>
                    </a>
                </div>
            </div>

            <!-- Right Column (Stacked Cards) -->
            <div class="lg:col-span-5 flex flex-col gap-8">
                
                <!-- Hospital Card -->
                <div class="bg-white rounded-[25px] shadow-lg overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300">
                    <div class="h-[180px] overflow-hidden">
                        <img :src="$store.healthcare.hospitalCard.image" alt="SPU Hospital" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <div class="p-6">
                        <h4 class="text-[20px] font-bold text-spu-blue mb-2" x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.titleAr : $store.healthcare.hospitalCard.titleEn"></h4>
                        <p class="text-gray-500 text-[14px] line-clamp-2" x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.descriptionAr : $store.healthcare.hospitalCard.descriptionEn"></p>
                    </div>
                </div>

                <!-- Dental Card -->
                <div class="bg-white rounded-[25px] shadow-lg overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300">
                    <div class="h-[180px] overflow-hidden">
                        <img :src="$store.healthcare.dentalCard.image" alt="SPU Dental" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <div class="p-6 flex flex-col h-full">
                        <h4 class="text-[20px] font-bold text-spu-blue mb-2" x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.titleAr : $store.healthcare.dentalCard.titleEn"></h4>
                        <p class="text-gray-500 text-[14px] mb-4 line-clamp-2" x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.descriptionAr : $store.healthcare.dentalCard.descriptionEn"></p>
                        <a :href="$store.healthcare.dentalCard.link" class="mt-auto text-spu-blue font-bold text-[14px] flex items-center gap-2 group-hover:text-spu-red transition-colors">
                            <span x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.linkTextAr : $store.healthcare.dentalCard.linkTextEn"></span>
                            <i class="fas fa-chevron-right text-[10px]"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>

        <!-- Statistics Banner -->
        <div x-ref="statsBanner" class="bg-spu-blue rounded-[25px] py-12 px-8 shadow-2xl relative overflow-hidden">
            <!-- Decorative background pattern -->
            <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 20px 20px;"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 relative z-10">
                <template x-for="(stat, index) in $store.healthcare.stats" :key="stat.id">
                    <div class="flex flex-col items-center justify-center text-center px-4" :class="index < $store.healthcare.stats.length - 1 ? 'lg:border-r lg:border-white/20' : ''">
                        <div class="flex items-baseline mb-2">
                           <span class="text-[48px] lg:text-[64px] font-bold text-white tracking-tight" x-text="stat.current"></span>
                           <span class="text-[28px] font-bold text-spu-red ml-1" x-text="stat.suffix"></span>
                        </div>
                        <p class="text-white/70 text-[14px] font-bold tracking-[0.1em] uppercase" x-text="$store.app.currentLang === 'ar' ? stat.labelAr : stat.labelEn"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</section>
