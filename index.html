    init() {

    startAuto() {
        this.stopAuto();
        this.timer = setInterval(() => this.next(), 5000);
    },
    stopAuto() {
        if (this.timer) clearInterval(this.timer);
    },
    next() {
        if(this.items.length > 0) {
            this.activeIndex = (this.activeIndex + 1) % this.items.length;
        }
    },
    prev() {
        if(this.items.length > 0) {
            this.activeIndex = (this.activeIndex - 1 + this.items.length) % this.items.length;

    handleManual(action, val) {
        this.stopAuto();
        if (action === 'next') this.next();
        if (action === 'prev') this.prev();
        if (action === 'goto') this.activeIndex = val;
        setTimeout(() => this.startAuto(), 8000);
    },
    getPos(index) {
        if(!this.items.length) return 0;
        return (index - this.activeIndex + this.items.length) % this.items.length;
    }

                    </div>

                    <a :href="$store.healthcare.mainCard.link"
                        class="inline-flex items-center justify-center px-10 py-3 bg-spu-blue text-white rounded-xl font-bold hover:bg-spu-red transition-all self-start">
                        <span
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.actionAr : $store.healthcare.mainCard.actionEn"></span>
                    </a>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col gap-8">
                <div
                    class="bg-white rounded-[2rem] shadow-lg overflow-hidden flex flex-col h-1/2 group hover:shadow-xl transition-all">
                    <div class="h-48 overflow-hidden">
                        <img :src="$store.healthcare.hospitalCard.image"
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    </div>
                    <div class="p-6">
                        <h4 class="text-xl font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.titleAr : $store.healthcare.hospitalCard.titleEn">
                        </h4>
                        <p class="text-gray-500 text-sm line-clamp-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.descriptionAr : $store.healthcare.hospitalCard.descriptionEn">
                        </p>
                    </div>
                </div>

                <div
                    class="bg-white rounded-[2rem] shadow-lg overflow-hidden flex flex-col h-1/2 group hover:shadow-xl transition-all">
                    <div class="h-48 overflow-hidden">
                        <img :src="$store.healthcare.dentalCard.image"
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    </div>
                    <div class="p-6">
                        <h4 class="text-xl font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.titleAr : $store.healthcare.dentalCard.titleEn">
                        </h4>
                        <a :href="$store.healthcare.dentalCard.link"
                            class="text-spu-blue font-bold text-sm flex items-center gap-2 hover:text-spu-red transition-colors mt-2">
                            <span
                                x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.linkTextAr : $store.healthcare.dentalCard.linkTextEn"></span>
                            <i class="fas fa-chevron-left rtl:block hidden text-[10px]"></i>
                            <i class="fas fa-chevron-right ltr:block hidden text-[10px]"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-spu-blue rounded-[2.5rem] py-12 px-8 shadow-2xl relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 pointer-events-none"
                style="background-image: radial-gradient(circle, #fff 1.5px, transparent 1.5px); background-size: 30px 30px;">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 relative z-10">
                <template x-for="(stat, index) in $store.healthcare.stats" :key="stat.id">
                    <div class="flex flex-col items-center justify-center text-center px-4"
                        :class="index !== ($store.healthcare.stats.length - 1) ? 'lg:border-r lg:border-white/20' : ''">
                        <div class="flex items-baseline mb-3">
                            <span class="text-5xl lg:text-6xl font-bold text-white tracking-tighter" translate="no"
                                x-text="stat.current"></span>

                            <span class="text-4xl lg:text-5xl font-bold text-white/90 ml-1" x-show="stat.unitEn"
                                x-text="$store.app.currentLang === 'ar' ? (stat.unitAr || stat.unitEn) : stat.unitEn"></span>

                            <span class="text-3xl font-bold text-spu-red ml-1" translate="no"
                                x-text="$store.app.currentLang === 'ar' ? stat.suffixAr : stat.suffixEn"></span>
                        </div>
                        <p class="text-white/60 text-xs font-bold tracking-widest uppercase"
                            x-text="$store.app.currentLang === 'ar' ? stat.labelAr : stat.labelEn"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</section>
  </main>
  <footer id="site-footer" x-data class="overflow-hidden bg-spu-blue pt-16 pb-8 font-hacen text-white">
    <div class="container">
        <div class="mb-16 grid grid-cols-1 gap-12 md:grid-cols-2 lg:grid-cols-12">
            <div class="flex flex-col items-start lg:col-span-4">
                <h2 class="mb-6 text-[24px] font-bold uppercase leading-tight tracking-wider" x-text="$store.app.currentLang === 'ar' ? $store.footer.identity.titleAr : $store.footer.identity.titleEn"></h2>
                <p class="mb-8 max-w-[320px] text-[16px] leading-[1.6] text-white/70" x-text="$store.app.currentLang === 'ar' ? $store.footer.identity.missionAr : $store.footer.identity.missionEn"></p>

                <div class="flex items-center gap-6 text-[22px]">
                    <template x-for="social in $store.footer.identity.socials" :key="social.icon">
                        <a :href="social.url" target="_blank" rel="noreferrer" class="text-white/80 transition-all hover:scale-110 hover:text-spu-red">
                            <i :class="social.icon"></i>
                        </a>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h3 class="mb-8 text-[18px] font-bold uppercase tracking-widest text-white/50" x-text="$store.app.currentLang === 'ar' ? $store.footer.resources.titleAr : $store.footer.resources.titleEn"></h3>
                <ul class="flex flex-col gap-4">
                    <template x-for="link in $store.footer.resources.links" :key="link.labelEn">
                        <li>
                            <a :href="link.url" class="text-[16px] text-white/80 transition-colors hover:text-white" x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn"></a>
                        </li>
                    </template>
                </ul>
            </div>

            <div class="lg:col-span-3">
                <h3 class="mb-8 text-[18px] font-bold uppercase tracking-widest text-white/50" x-text="$store.app.currentLang === 'ar' ? $store.footer.contact.titleAr : $store.footer.contact.titleEn"></h3>
                <div class="flex flex-col gap-6">
                    <template x-for="item in $store.footer.contact.items" :key="item.icon + item.textEn">
                        <div class="flex items-start gap-4">
                            <i :class="item.icon" class="mt-1.5 text-spu-red"></i>
                            <span class="text-[15px] leading-relaxed text-white/80" :class="item.ltr ? 'ltr' : ''" x-html="$store.app.currentLang === 'ar' ? item.textAr : item.textEn"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex flex-col items-start lg:col-span-3 lg:items-end">
                <h3 class="mb-8 w-full text-left text-[18px] font-bold uppercase tracking-widest text-white/50" :class="$store.app.currentLang === 'ar' ? 'lg:text-right' : 'lg:text-left'" x-text="$store.app.currentLang === 'ar' ? $store.footer.location.titleAr : $store.footer.location.titleEn"></h3>
                <div class="group h-[180px] w-full overflow-hidden rounded-[12px] border border-white/10 shadow-2xl">
                    <iframe :src="$store.footer.location.mapUrl" class="h-full w-full grayscale-[0.3] opacity-80 transition-all duration-700 group-hover:grayscale-0 group-hover:opacity-100" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>

        <hr class="mb-8 border-white/10">

        <div class="flex flex-col items-center justify-between gap-6 md:flex-row">
            <p class="text-[14px] text-white/50" translate="no" x-html="$store.app.currentLang === 'ar' ? $store.footer.bottom.copyrightAr : $store.footer.bottom.copyrightEn"></p>

            <div class="flex flex-wrap items-center justify-center gap-6 text-[14px]">
                <template x-for="link in $store.footer.bottom.links" :key="link.labelEn">
                    <a :href="link.protected ? '/services.html#portal-access' : link.url" @click="if (link.protected) { $event.preventDefault(); $store.auth.requestProtectedAccess(link.url); }" class="text-white/50 transition-colors hover:text-white" :target="!link.protected && link.url.startsWith('http') ? '_blank' : null" :rel="!link.protected && link.url.startsWith('http') ? 'noreferrer' : null" x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn"></a>
                </template>
            </div>
        </div>
    </div>
</footer>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
