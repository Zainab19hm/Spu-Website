<section id="hero-next"
    x-data="{
        hasCounted: false,
        runCount() {
            if (this.hasCounted) return;
            this.hasCounted = true;
            this.$store.stats.startCounting();
        },
        init() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    this.runCount();
                    observer.disconnect();
                }
            }, { threshold: 0.2 });

            observer.observe(this.$el);

            const rect = this.$el.getBoundingClientRect();
            if (rect.top < window.innerHeight && rect.bottom > 0) {
                this.runCount();
                observer.disconnect();
            }
        }
    }"
    class="stats-section relative z-20 w-full overflow-hidden font-hacen reveal scroll-mt-24"

        <div class="grid grid-cols-1 gap-10 xl:grid-cols-[minmax(0,560px)_minmax(0,1fr)] xl:items-start">
            <div class="overflow-hidden rounded-[20px] bg-white shadow-[0_18px_40px_rgba(0,0,0,0.22)]">
                <template x-if="selectedEvent">
                    <article class="flex min-h-[440px] flex-col">
                        <div class="relative h-[220px] overflow-hidden md:h-[250px]">
                            <img :src="selectedEvent.image"
                                :alt="$store.app.currentLang === 'ar' ? selectedEvent.titleAr : selectedEvent.titleEn"
                                class="h-full w-full object-cover">
                            <div class="absolute inset-x-6 top-6 w-fit rounded-[10px] bg-[#27316d] px-7 py-2 text-[15px] font-bold text-white"
                                :class="$store.app.currentLang === 'ar' ? 'right-6 left-auto' : 'left-6 right-auto'"
                                x-text="selectedEvent.type"></div>
                        </div>

                        <div class="flex flex-1 flex-col bg-[#edf2fa] px-8 py-6 md:px-8 md:py-5">
                            <p class="mb-5 text-[15px] font-bold text-[#c63030]" x-html="selectedEvent.dateText"></p>
                            <p class="mb-6 text-[17px] leading-[1.65] text-[#55627c]"
                                x-text="$store.app.currentLang === 'ar' ? (selectedEvent.descriptionAr || selectedEvent.description) : (selectedEvent.descriptionEn || selectedEvent.description)">

                            <a :href="selectedEvent.link || '#'"
                                class="inline-flex w-fit items-center gap-2 text-[18px] font-bold text-[#1e2652] transition hover:text-spu-red">
                                <span x-text="$store.app.ui.exploreDetails[$store.app.currentLang]"></span>
                                <i class="fas fa-chevron-right text-[11px]"></i>
                            </a>

                            <div class="mt-auto pt-5">
                                <div class="border-t border-[#9c2a2a]"></div>
                                <div class="flex items-center justify-center gap-2 pt-7">
                                    <template x-for="(eventItem, index) in selectedDateEvents" :key="eventItem.id">
                                        <button type="button" @click="selectEvent(index)"
                                            class="h-[8px] rounded-full transition-all duration-300"
                                            :class="activeEventIndex === index ? 'w-[24px] bg-[#27316d]' : 'w-[8px] bg-[#d1d5de]'"

                                    </template>
                                </div>
                            </div>
                        </div>
                    </article>
                </template>

                <template x-if="!selectedEvent">
                    <div class="flex min-h-[440px] flex-col items-center justify-center bg-[#edf2fa] px-10 text-center">
                        <p class="mb-4 text-[15px] font-bold text-[#c63030]" x-html="selectedDateLabel"></p>
                        <p class="max-w-[360px] text-[18px] leading-[1.7] text-[#55627c]"
                            x-text="$store.app.ui.noEvents[$store.app.currentLang]"></p>
                        <p class="max-w-[360px] text-[14px] leading-[1.7] text-gray-500 mt-2"
                            x-text="$store.app.ui.chooseAnother[$store.app.currentLang]"></p>

                </template>
            </div>

            <div
                class="rounded-[28px] bg-white px-6 py-7 shadow-[0_18px_40px_rgba(0,0,0,0.18)] sm:px-8 sm:py-8 lg:px-7 xl:min-h-[440px] xl:px-8">
                <div class="mb-7 flex items-start justify-between gap-4">
                    <div class="flex items-end gap-5 text-[#1e2652]">
                        <span class="text-[21px] font-bold"
                            x-text="$store.app.ui.months[$store.app.currentLang][viewDate.month()]"></span>
                            <span class="text-[40px] font-black leading-none sm:text-[48px]" translate="no"
                                x-text="viewDate.format('YYYY')"></span>
                    </div>

                    <div class="flex items-center gap-2 text-[#111111]">
                        <button type="button" @click="prevMonth()"
                            class="flex h-10 w-10 items-center justify-center rounded-full transition hover:bg-gray-100">
                            <i class="fas fa-chevron-left text-[15px]"></i>
                        </button>
                        <button type="button" @click="nextMonth()"
                            class="flex h-10 w-10 items-center justify-center rounded-full transition hover:bg-gray-100">
                            <i class="fas fa-chevron-right text-[15px]"></i>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-y-3 sm:gap-y-4">
                    <template x-for="day in calendarDays" :key="day.date">
                        <button type="button" @click="selectDate(day.date)"

                            :class="selectedDate === day.date ? 'bg-[#27316d]' : 'bg-transparent hover:bg-[#f5f7fc]'">
                            <span class="text-[18px] font-semibold transition-colors sm:text-[20px]"
                                :class="selectedDate === day.date ? 'text-white' : day.isCurrentMonth ? 'text-[#111111]' : 'text-[#d0d0d0]'"
                                x-html="day.dayNumber"></span>

                            <span x-show="day.hasEvent && selectedDate !== day.date"
                                class="absolute bottom-[6px] left-1/2 h-[4px] w-[4px] -translate-x-1/2 rounded-full bg-[#27316d]"></span>
                        </button>
                    </template>
                </div>
            </div>
        </div>

</section>
<!-- 
    HEALTHCARE FACILITIES SECTION
    Includes content cards for Hospital/Dental and a scrolling-stats banner 
-->
<section x-data="{
        hasCounted: false,
        isVisible: false,
        // Trigger counter animation once
        runCount() {
            if (this.hasCounted) return;
            this.hasCounted = true;
            this.$store.healthcare.startCounting();
        },
        // Initialize IntersectionObserver to detect when user scrolls to the stats
        init() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    this.runCount();
                    observer.disconnect(); // Stop observing after animation starts
                }
            }, { threshold: 0.1 });
            observer.observe(this.$refs.statsBanner);
        }
    }" class="py-10 bg-section font-hacen overflow-hidden reveal"
    x-init="(() => { const observer = new IntersectionObserver(entries => { if (entries[0].isIntersecting) { isVisible = true; observer.disconnect(); } }, { threshold: 0.15 }); observer.observe($el); })()">

    <div class="container">
        <!-- Section Title with branding 'U' -->
        <h2 class="text-[52px] font-bold text-spu-blue mb-6 text-center lg:text-left">
            <span
                x-text="$store.app.currentLang === 'ar' ? 'المرافق الطبية والخدمية' : 'SPU Healthcare Facilities'"></span>
        </h2>

        <!-- Main Facility Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10">

            <!-- Large Focus Card (Left) -->
            <div
                class="lg:col-span-7 bg-white rounded-[16px] shadow-xl overflow-hidden flex flex-col group hover:shadow-2xl transition-all duration-500">
                <div class="h-[320px] overflow-hidden">
                    <img :src="$store.healthcare.mainCard.image" alt="Healthcare Staff"
                        class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                </div>
                <div class="px-4 py-2 flex-1 flex flex-col justify-center">
                    <div>
                        <h3 class="text-[24px] font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.titleAr : $store.healthcare.mainCard.titleEn">
                        </h3>
                        <p class="text-gray-600 text-[15px] leading-relaxed mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.descriptionAr : $store.healthcare.mainCard.descriptionEn">
                        </p>

                        <!-- Feature List with localized features from store -->
                        <ul class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                            <template
                                x-for="feature in ($store.app.currentLang === 'ar' ? $store.healthcare.mainCard.featuresAr : $store.healthcare.mainCard.featuresEn)"
                                :key="feature">
                                <li class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center">
                                        <i class="fas fa-check text-green-600 text-[12px]"></i>
                                    </div>
                                    <span class="text-spu-blue font-medium" x-text="feature"></span>
                                </li>
                            </template>
                        </ul>
                    </div>

                    <!-- Primary Action Button -->
                    <div class="mt-2 text-right">
                        <a :href="$store.healthcare.mainCard.link"
                            class="inline-flex items-center justify-center px-8 py-2 bg-spu-blue text-white rounded-[12px] font-bold hover:bg-opacity-90 transition-all">
                            <span
                                x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.actionAr : $store.healthcare.mainCard.actionEn"></span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Side Facilities (Stacked) -->
            <div class="lg:col-span-5 flex flex-col gap-6">

                <!-- Hospital Card -->
                <div
                    class="bg-white rounded-[25px] shadow-lg overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300">
                    <div class="h-[200px] overflow-hidden">
                        <img :src="$store.healthcare.hospitalCard.image" alt="SPU Hospital"
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <div class="px-5 py-2 flex flex-col h-full justify-center">
                        <h4 class="text-[20px] font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.titleAr : $store.healthcare.hospitalCard.titleEn">
                        </h4>
                        <p class="text-gray-500 text-[14px] line-clamp-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.descriptionAr : $store.healthcare.hospitalCard.descriptionEn">
                        </p>
                    </div>
                </div>

                <!-- Dental Card -->
                <div
                    class="bg-white rounded-[25px] shadow-lg overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300">
                    <div class="h-[200px] overflow-hidden">
                        <img :src="$store.healthcare.dentalCard.image" alt="SPU Dental"
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <div class="px-5 flex flex-col h-full py-2 justify-center">
                        <h4 class="text-[20px] font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.titleAr : $store.healthcare.dentalCard.titleEn">
                        </h4>
                        <p class="text-gray-500 text-[14px] mb-4 line-clamp-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.descriptionAr : $store.healthcare.dentalCard.descriptionEn">
                        </p>
                        <a :href="$store.healthcare.dentalCard.link"
                            class="text-spu-blue font-bold text-[14px] flex items-center gap-2 group-hover:text-spu-red transition-colors">
                            <span
                                x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.linkTextAr : $store.healthcare.dentalCard.linkTextEn"></span>
                            <i class="fas fa-chevron-right text-[10px]"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>

        <!-- Animated Statistics Banner -->
        <div x-ref="statsBanner" class="bg-spu-blue rounded-[25px] py-8 px-8 shadow-2xl relative overflow-hidden">
            <div class="absolute inset-0 opacity-5 pointer-events-none"
                style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 20px 20px;">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 relative z-10">
                <template x-for="(stat, index) in $store.healthcare.stats" :key="stat.id">
                    <div class="flex flex-col items-center justify-center text-center px-4"
                        :class="index $store.healthcare.stats.length - 1 ? 'lg:border-r lg:border-white/20' : ''">
                        <div class="flex items-baseline mb-2">
                            <span class="text-[48px] lg:text-[64px] font-bold text-white tracking-tight"
                                translate="no" x-text="stat.current"></span>
                            <span x-show="stat.unitEn" class="text-[48px] lg:text-[64px] font-bold text-white tracking-tight"
                                translate="no" x-text="$store.app.currentLang === 'ar' ? (stat.unitAr || stat.unitEn) : stat.unitEn"></span>
                            <span class="text-[38px] font-bold text-spu-red ml-1" translate="no" x-text="$store.app.currentLang === 'ar' ? stat.suffixAr : stat.suffixEn"></span>
                        </div>
                        <p class="text-white/70 text-[14px] font-bold tracking-[0.1em] uppercase"
                            x-text="$store.app.currentLang === 'ar' ? stat.labelAr : stat.labelEn"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</section>
    </main>
    <div data-layout-slot="footer" data-component-ready="true" data-component-source="/components/layout/footer.html">
<footer id="site-footer" x-data class="overflow-hidden bg-spu-blue pt-16 pb-8 font-hacen text-white">
    <div class="container">
        <div class="mb-16 grid grid-cols-1 gap-12 md:grid-cols-2 lg:grid-cols-12">
            <div class="flex flex-col items-start lg:col-span-4">
                <h2 class="mb-6 text-[24px] font-bold uppercase leading-tight tracking-wider" x-text="$store.app.currentLang === 'ar' ? $store.footer.identity.titleAr : $store.footer.identity.titleEn"></h2>
                <p class="mb-8 max-w-[320px] text-[16px] leading-[1.6] text-white/70" x-text="$store.app.currentLang === 'ar' ? $store.footer.identity.missionAr : $store.footer.identity.missionEn"></p>

                <div class="flex items-center gap-6 text-[22px]">
                    <template x-for="social in $store.footer.identity.socials" :key="social.icon">
                        <a :href="social.url" target="_blank" rel="noreferrer" class="text-white/80 transition-all hover:scale-110 hover:text-spu-red">
                            <i :class="social.icon"></i>
                        </a>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h3 class="mb-8 text-[18px] font-bold uppercase tracking-widest text-white/50" x-text="$store.app.currentLang === 'ar' ? $store.footer.resources.titleAr : $store.footer.resources.titleEn"></h3>
                <ul class="flex flex-col gap-4">
                    <template x-for="link in $store.footer.resources.links" :key="link.labelEn">
                        <li>
                            <a :href="link.url" class="text-[16px] text-white/80 transition-colors hover:text-white" x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn"></a>
                        </li>
                    </template>
                </ul>
            </div>

            <div class="lg:col-span-3">
                <h3 class="mb-8 text-[18px] font-bold uppercase tracking-widest text-white/50" x-text="$store.app.currentLang === 'ar' ? $store.footer.contact.titleAr : $store.footer.contact.titleEn"></h3>
                <div class="flex flex-col gap-6">
                    <template x-for="item in $store.footer.contact.items" :key="item.icon + item.textEn">
                        <div class="flex items-start gap-4">
                            <i :class="item.icon" class="mt-1.5 text-spu-red"></i>
                            <span class="text-[15px] leading-relaxed text-white/80" :class="item.ltr ? 'ltr' : ''" x-html="$store.app.currentLang === 'ar' ? item.textAr : item.textEn"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex flex-col items-start lg:col-span-3 lg:items-end">
                <h3 class="mb-8 w-full text-left text-[18px] font-bold uppercase tracking-widest text-white/50" :class="$store.app.currentLang === 'ar' ? 'lg:text-right' : 'lg:text-left'" x-text="$store.app.currentLang === 'ar' ? $store.footer.location.titleAr : $store.footer.location.titleEn"></h3>
                <div class="group h-[180px] w-full overflow-hidden rounded-[12px] border border-white/10 shadow-2xl">
                    <iframe :src="$store.footer.location.mapUrl" class="h-full w-full grayscale-[0.3] opacity-80 transition-all duration-700 group-hover:grayscale-0 group-hover:opacity-100" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>

        <hr class="mb-8 border-white/10">

        <div class="flex flex-col items-center justify-between gap-6 md:flex-row">
            <p class="text-[14px] text-white/50" translate="no" x-html="$store.app.currentLang === 'ar' ? $store.footer.bottom.copyrightAr : $store.footer.bottom.copyrightEn"></p>

            <div class="flex flex-wrap items-center justify-center gap-6 text-[14px]">
                <template x-for="link in $store.footer.bottom.links" :key="link.labelEn">
                    <a :href="link.protected ? '/services.html#portal-access' : link.url" @click="if (link.protected) { $event.preventDefault(); $store.auth.requestProtectedAccess(link.url); }" class="text-white/50 transition-colors hover:text-white" :target="!link.protected && link.url.startsWith('http') ? '_blank' : null" :rel="!link.protected && link.url.startsWith('http') ? 'noreferrer' : null" x-text="$store.app.currentLang === 'ar' ? link.labelAr : link.labelEn"></a>
                </template>
            </div>
        </div>
    </div>
</footer>
    </div>
    <script>
        (function () {
            window.__spuLoadingFallbackTimer = window.setTimeout(function () {
                var body = document.body;
                if (!body || body.dataset.appReady !== 'loading') {
                    return;
                }

                var help = document.querySelector('[data-loading-help]');
                var helpText = document.querySelector('[data-loading-help-text]');
                var isLocal = /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname);

                if (help) {
                    help.setAttribute('data-visible', 'true');
                }

                if (helpText) {
                    helpText.innerHTML = isLocal
                        ? 'The app bundle has not started yet. If you are running locally, start the site with <code>npm run dev</code> or serve the built <code>dist</code> folder.'
                        : 'The app bundle has not started yet. You can reload the page or continue to the fallback content.';
                }
            }, 3500);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
