<section x-data class="bg-white py-20 font-hacen lg:py-24">
    <div class="container grid gap-8 lg:grid-cols-[1.05fr_0.95fr]">
        <article class="overflow-hidden rounded-[32px] bg-spu-blue text-white shadow-[0_28px_80px_rgba(20,30,70,0.18)]">
            <img :src="$store.newsPage.featured.image" :alt="$store.app.currentLang === 'ar' ? $store.newsPage.featured.titleAr : $store.newsPage.featured.titleEn" class="h-72 w-full object-cover opacity-75">
            <div class="p-8 lg:p-10">
                <p class="text-sm font-bold uppercase tracking-[0.3em] text-white/55" x-text="$store.app.currentLang === 'ar' ? $store.newsPage.featured.categoryAr : $store.newsPage.featured.categoryEn"></p>
                <h2 class="mt-5 text-3xl font-bold leading-tight" x-text="$store.app.currentLang === 'ar' ? $store.newsPage.featured.titleAr : $store.newsPage.featured.titleEn"></h2>
                <p class="mt-3 text-sm uppercase tracking-[0.2em] text-white/55" x-text="$store.newsPage.featured.date"></p>
                <p class="mt-5 text-[16px] leading-8 text-white/80" x-text="$store.app.currentLang === 'ar' ? $store.newsPage.featured.summaryAr : $store.newsPage.featured.summaryEn"></p>
            </div>
        </article>

        <div class="grid gap-5">
            <template x-for="story in $store.newsPage.stories.slice(0, 2)" :key="story.titleEn">
                <article class="rounded-[28px] border border-slate-200/80 bg-white p-7 shadow-[0_18px_50px_rgba(20,30,70,0.08)]">
                    <div class="flex items-center justify-between gap-4">
                        <p class="text-xs font-bold uppercase tracking-[0.24em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? story.categoryAr : story.categoryEn"></p>
                        <p class="text-xs font-medium uppercase tracking-[0.18em] text-slate-400" x-text="story.date"></p>
                    </div>
                    <h3 class="mt-5 text-2xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? story.titleAr : story.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? story.summaryAr : story.summaryEn"></p>
                </article>
            </template>
        </div>
    </div>
</section>
