<section class="py-12 px-6 bg-slate-50/50 rounded-[3rem] border border-slate-100 shadow-inner">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16">
            <p class="text-sm font-bold uppercase tracking-widest text-spu-red"
                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.directorates.eyebrowAr : $store.aboutPage.directorates.eyebrowEn">
            </p>
            <h1 class="mt-4 text-4xl md:text-5xl font-bold text-spu-blue"
                x-text="$store.app.currentLang === 'ar' ? $store.aboutPage.directorates.titleAr : $store.aboutPage.directorates.titleEn">
            </h1>
            <div class="mt-6 h-1 w-24 bg-spu-red mx-auto rounded-full"></div>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <template x-for="item in $store.aboutPage.directorates.items" :key="item.titleEn">
                <div
                    class="p-10 rounded-[2.5rem] bg-white border border-slate-100 shadow-xl shadow-blue-900/5 transition-all duration-500 hover:-translate-y-2">
                    <h3 class="text-2xl font-bold text-spu-blue mb-6 border-b border-slate-50 pb-4"
                        x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                    <p class="text-slate-600 leading-relaxed italic"
                        x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                </div>
            </template>
        </div>

        <div class="mt-20 pt-10 border-t border-slate-100 text-center">
            <a href="/about.html"
                class="inline-flex items-center gap-3 px-8 py-4 rounded-2xl bg-white border border-slate-200 text-spu-blue font-bold transition-all hover:bg-slate-50 hover:shadow-lg">
                <i class="fas fa-arrow-right rtl:rotate-180 rotate-0"></i>
                <span x-text="$store.app.currentLang === 'ar' ? 'العودة إلى نظرة عامة' : 'Back to Overview'"></span>
            </a>
        </div>
    </div>
</section>
