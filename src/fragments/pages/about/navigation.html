<section id="about-navigation" class="relative py-20 bg-white font-hacen">
    <div class="container relative z-10">
        <div class="border-t border-gray-100 pt-16">
            <div class="flex flex-col items-center mb-12 text-center">
                <h3 class="text-2xl font-bold text-spu-blue"
                    x-text="$store.app.currentLang === 'ar' ? 'استكشف المزيد عن الجامعة' : 'Explore More About SPU'">
                </h3>
                <div class="mt-2 h-1.5 w-20 bg-gradient-to-r from-spu-blue to-spu-red rounded-full"></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <template x-for="sub in $store.aboutPage.subPages" :key="sub.id">
                    <a :href="sub.link" @click="$store.aboutPage.navigate($event, sub.id)"
                        class="group relative block p-8 rounded-[1rem] bg-white border border-slate-100 shadow-sm overflow-hidden transition-all duration-500 hover:shadow-2xl hover:border-spu-blue/20 hover:-translate-y-3">

                        <div
                            class="absolute -right-4 -top-4 w-24 h-24 bg-spu-blue/5 rounded-full transition-all duration-700 group-hover:scale-[3] group-hover:bg-spu-blue/10">
                        </div>

                        <div class="relative z-10">
                            <div
                                class="w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center text-spu-blue transition-all duration-500 group-hover:bg-spu-blue group-hover:text-white  mb-6 shadow-inner">
                                <i :class="sub.icon" class="text-xl"></i>
                            </div>

                            <h4 class="text-lg font-bold text-spu-blue transition-colors duration-300 group-hover:text-spu-red"
                                x-text="$store.app.currentLang === 'ar' ? sub.titleAr : sub.titleEn"></h4>

                            <div
                                class="mt-4 flex items-center gap-2 text-sm font-bold text-slate-400 opacity-0 -translate-x-4 transition-all duration-500 group-hover:opacity-100 group-hover:translate-x-0">
                                <span
                                    x-text="$store.app.currentLang === 'ar' ? 'اكتشف القسم' : 'Discover Section'"></span>
                                <i class="fas fa-arrow-left rtl:rotate-0 rotate-180"></i>
                            </div>
                        </div>

                        <div
                            class="absolute bottom-0 left-0 h-1 bg-spu-red w-0 transition-all duration-500 group-hover:w-full">
                        </div>
                    </a>
                </template>
            </div>
        </div>
    </div>
</section>
