<section x-data class="bg-section py-20 font-hacen lg:py-24">
    <div class="container grid gap-10 lg:grid-cols-[0.9fr_1.1fr] lg:items-start">
        <div class="rounded-[32px] bg-spu-blue p-10 text-white shadow-[0_28px_80px_rgba(20,30,70,0.18)] lg:p-12">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-white/55" x-text="$store.app.currentLang === 'ar' ? $store.facultiesPage.support.eyebrowAr : $store.facultiesPage.support.eyebrowEn"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight md:text-4xl" x-text="$store.app.currentLang === 'ar' ? $store.facultiesPage.support.titleAr : $store.facultiesPage.support.titleEn"></h2>
            <p class="mt-6 text-[16px] leading-8 text-white/80" x-text="$store.app.currentLang === 'ar' ? $store.facultiesPage.support.summaryAr : $store.facultiesPage.support.summaryEn"></p>
        </div>

        <div class="grid gap-5 md:grid-cols-3">
            <template x-for="item in $store.facultiesPage.pathways" :key="item.titleEn">
                <article class="rounded-[28px] bg-white p-7 shadow-[0_18px_50px_rgba(20,30,70,0.08)]">
                    <h3 class="text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                </article>
            </template>

            <template x-for="item in $store.facultiesPage.supportCards" :key="item.titleEn">
                <article class="rounded-[28px] border border-white/80 bg-white/85 p-7 shadow-[0_16px_45px_rgba(20,30,70,0.06)]">
                    <h3 class="text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                </article>
            </template>
        </div>
    </div>
</section>
