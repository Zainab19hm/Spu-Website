<section id="research-initiatives" x-data class="bg-section py-20 font-hacen lg:py-24">
    <div class="container grid gap-10 lg:grid-cols-[0.95fr_1.05fr]">
        <div class="rounded-[32px] bg-spu-blue p-10 text-white shadow-[0_28px_80px_rgba(20,30,70,0.18)] lg:p-12">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-white/55" x-text="$store.app.currentLang === 'ar' ? $store.researchPage.centers.eyebrowAr : $store.researchPage.centers.eyebrowEn"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight md:text-4xl" x-text="$store.app.currentLang === 'ar' ? $store.researchPage.centers.titleAr : $store.researchPage.centers.titleEn"></h2>
            <p class="mt-6 text-[16px] leading-8 text-white/80" x-text="$store.app.currentLang === 'ar' ? $store.researchPage.centers.summaryAr : $store.researchPage.centers.summaryEn"></p>

            <div class="mt-8 grid gap-4 sm:grid-cols-3">
                <template x-for="item in $store.researchPage.outputs" :key="item.labelEn">
                    <article class="rounded-[22px] border border-white/12 bg-white/8 p-5 backdrop-blur-sm">
                        <p class="text-xs font-bold uppercase tracking-[0.24em] text-white/55" x-text="$store.app.currentLang === 'ar' ? item.labelAr : item.labelEn"></p>
                        <p class="mt-3 text-xl font-bold text-white" x-text="item.value"></p>
                    </article>
                </template>
            </div>
        </div>

        <div class="grid gap-5">
            <template x-for="item in $store.researchPage.centerCards" :key="item.titleEn">
                <article class="rounded-[28px] bg-white p-7 shadow-[0_18px_50px_rgba(20,30,70,0.08)]">
                    <h3 class="text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                    <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                </article>
            </template>

            <div class="grid gap-5 md:grid-cols-2">
                <template x-for="story in $store.researchPage.stories" :key="story.titleEn">
                    <article class="rounded-[28px] border border-slate-200/80 bg-white p-7 shadow-[0_16px_45px_rgba(20,30,70,0.06)]">
                        <p class="text-xs font-bold uppercase tracking-[0.24em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? story.categoryAr : story.categoryEn"></p>
                        <h3 class="mt-4 text-xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? story.titleAr : story.titleEn"></h3>
                        <p class="mt-4 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? story.summaryAr : story.summaryEn"></p>
                    </article>
                </template>
            </div>
        </div>
    </div>
</section>
