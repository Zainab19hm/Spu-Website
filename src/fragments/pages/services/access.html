<section id="portal-access" x-data="{ identityValue: $store.auth.identity }" class="bg-white py-20 font-hacen lg:py-24">
    <div class="container grid gap-8 lg:grid-cols-[1.05fr_0.95fr]">
        <div class="rounded-[32px] border border-slate-200/80 bg-white p-8 shadow-[0_18px_50px_rgba(20,30,70,0.08)] lg:p-10">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-red/70" x-text="$store.app.currentLang === 'ar' ? $store.servicesPage.access.eyebrowAr : $store.servicesPage.access.eyebrowEn"></p>
            <h2 class="mt-5 text-3xl font-bold leading-tight text-spu-blue md:text-4xl" x-text="$store.app.currentLang === 'ar' ? $store.servicesPage.access.titleAr : $store.servicesPage.access.titleEn"></h2>
            <p class="mt-6 text-[16px] leading-8 text-slate-600" x-text="$store.app.currentLang === 'ar' ? $store.servicesPage.access.summaryAr : $store.servicesPage.access.summaryEn"></p>

            <form class="mt-8 space-y-5" @submit.prevent="$store.auth.signIn(identityValue)">
                <div>
                    <label for="portal-identity" class="text-sm font-bold uppercase tracking-[0.2em] text-spu-blue/65" x-text="$store.app.currentLang === 'ar' ? 'معرّف الطالب أو الموظف' : 'Student or Staff ID'"></label>
                    <input id="portal-identity" x-model="identityValue" type="text" required autocomplete="username" spellcheck="false" class="mt-3 w-full rounded-[18px] border border-slate-200 bg-slate-50 px-4 py-4 text-[15px] text-slate-700 outline-none transition-colors focus:border-spu-blue focus:bg-white" :placeholder="$store.app.currentLang === 'ar' ? 'أدخل المعرّف الجامعي' : 'Enter your university ID'">
                </div>

                <div class="flex flex-col gap-3 sm:flex-row">
                    <button type="submit" class="inline-flex items-center justify-center rounded-full bg-spu-blue px-6 py-3 text-sm font-bold text-white transition-colors hover:bg-spu-red" x-text="$store.auth.isAuthenticated ? ($store.app.currentLang === 'ar' ? 'تحديث التحقق' : 'Refresh Verification') : ($store.app.currentLang === 'ar' ? 'تحقق من الوصول' : 'Verify Access')"></button>
                    <button type="button" x-show="$store.auth.isAuthenticated" x-cloak @click="$store.auth.completeAccess()" class="inline-flex items-center justify-center rounded-full border border-spu-blue px-6 py-3 text-sm font-bold text-spu-blue transition-colors hover:border-spu-red hover:text-spu-red" x-text="$store.app.currentLang === 'ar' ? 'المتابعة إلى الخدمة المطلوبة' : 'Continue to Requested Service'"></button>
                    <button type="button" x-show="$store.auth.isAuthenticated" x-cloak @click="$store.auth.signOut(); identityValue = ''" class="inline-flex items-center justify-center rounded-full border border-slate-300 px-6 py-3 text-sm font-bold text-slate-600 transition-colors hover:border-slate-500 hover:text-slate-900" x-text="$store.app.currentLang === 'ar' ? 'تسجيل الخروج' : 'Sign Out'"></button>
                </div>
            </form>

            <div class="mt-6 rounded-[24px] bg-section px-6 py-5 text-[15px] leading-7 text-slate-700" :class="$store.auth.isAuthenticated ? 'border border-emerald-200 bg-emerald-50 text-emerald-950' : 'border border-slate-200'">
                <p class="font-bold" x-text="$store.auth.isAuthenticated ? ($store.app.currentLang === 'ar' ? 'تم تأكيد الوصول من هذه الواجهة.' : 'Access confirmed from this frontend handoff.') : ($store.app.currentLang === 'ar' ? 'يلزم التحقق قبل متابعة الخدمات المحمية.' : 'Verification is required before protected services continue.')"></p>
                <p class="mt-2" x-text="$store.auth.isAuthenticated ? ($store.app.currentLang === 'ar' ? 'يمكنك الآن المتابعة إلى البوابة الرسمية أو التسجيل الإلكتروني أو أحد موارد الدعم.' : 'You can now continue to the official portal, electronic registration, or a support resource.') : ($store.app.currentLang === 'ar' ? 'إذا كانت إحدى الخدمات غير متاحة، يبقى مسار الدعم اليدوي مرئياً ضمن الصفحة.' : 'If a digital service is unavailable, the manual support path remains visible on this page.')"></p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="rounded-[32px] bg-spu-blue p-8 text-white shadow-[0_20px_60px_rgba(20,30,70,0.12)] lg:p-10">
                <p class="text-sm font-bold uppercase tracking-[0.35em] text-white/55" x-text="$store.app.currentLang === 'ar' ? 'متطلبات الوصول' : 'Access Requirements'"></p>
                <div class="mt-6 grid gap-4">
                    <template x-for="item in $store.servicesPage.requirements" :key="item.titleEn">
                        <article class="rounded-[22px] border border-white/12 bg-white/8 px-5 py-5 backdrop-blur-sm">
                            <h3 class="text-lg font-bold text-white" x-text="$store.app.currentLang === 'ar' ? item.titleAr : item.titleEn"></h3>
                            <p class="mt-3 text-[15px] leading-7 text-white/78" x-text="$store.app.currentLang === 'ar' ? item.summaryAr : item.summaryEn"></p>
                        </article>
                    </template>
                </div>
            </div>

            <div id="library-support" class="rounded-[32px] border border-slate-200/80 bg-white p-8 shadow-[0_18px_50px_rgba(20,30,70,0.08)] lg:p-10">
                <div class="flex items-center justify-between gap-4">
                    <div>
                        <p class="text-sm font-bold uppercase tracking-[0.35em] text-spu-blue/60" x-text="$store.app.currentLang === 'ar' ? 'الموارد المتاحة' : 'Available Resources'"></p>
                        <h2 class="mt-4 text-2xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? 'الخدمات الموثقة ومسارات الدعم' : 'Verified services and support paths'"></h2>
                    </div>
                    <span class="rounded-full bg-slate-100 px-4 py-2 text-xs font-bold uppercase tracking-[0.24em] text-slate-500" x-text="$store.auth.isAuthenticated ? ($store.app.currentLang === 'ar' ? 'مفعل' : 'Verified') : ($store.app.currentLang === 'ar' ? 'تحتاج تحققاً' : 'Verification Needed')"></span>
                </div>

                <div class="mt-8 grid gap-4">
                    <template x-for="resource in $store.servicesPage.resources" :key="resource.id">
                        <a :href="resource.protected ? $store.auth.servicesHubPath : resource.url" @click="if (resource.protected) { $event.preventDefault(); $store.auth.requestProtectedAccess(resource.url); }" class="rounded-[24px] border border-slate-200/80 bg-slate-50 px-6 py-5 transition-transform duration-300 hover:-translate-y-1 hover:bg-white hover:shadow-[0_18px_45px_rgba(20,30,70,0.08)]" :target="!resource.protected && resource.url.startsWith('http') ? '_blank' : null" :rel="!resource.protected && resource.url.startsWith('http') ? 'noreferrer' : null">
                            <div class="flex items-start justify-between gap-4">
                                <div>
                                    <h3 class="text-lg font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? resource.titleAr : resource.titleEn"></h3>
                                    <p class="mt-3 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? resource.summaryAr : resource.summaryEn"></p>
                                </div>
                                <span class="rounded-full px-3 py-1 text-[11px] font-bold uppercase tracking-[0.22em]" :class="resource.protected ? 'bg-spu-blue text-white' : 'bg-slate-200 text-slate-600'" x-text="resource.protected ? ($store.app.currentLang === 'ar' ? 'محمي' : 'Protected') : ($store.app.currentLang === 'ar' ? 'مباشر' : 'Direct')"></span>
                            </div>
                        </a>
                    </template>
                </div>
            </div>
        </div>
    </div>
</section>
