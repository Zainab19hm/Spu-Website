<section x-data="{
        hasCounted: false,
        // وظيفة لتشغيل العداد مرة واحدة فقط عند الظهور
        runCount() {
            if (this.hasCounted) return;
            this.hasCounted = true;
            if (this.$store.healthcare && this.$store.healthcare.startCounting) {
                this.$store.healthcare.startCounting();
            }
        }
    }" x-init="() => {
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                runCount();
                observer.disconnect();
            }
        }, { threshold: 0.15 });
        observer.observe($el);
    }" class="py-16 bg-slate-50 font-hacen overflow-hidden reveal">

    <div class="container">
        <h2 class="text-4xl lg:text-5xl font-bold text-spu-blue mb-10 ">
            <span
                x-text="$store.app.currentLang === 'ar' ? 'المرافق الطبية والخدمية' : 'SPU Healthcare Facilities'"></span>
        </h2>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">

            <div
                class="lg:col-span-7 bg-white rounded-[2rem] shadow-xl overflow-hidden flex flex-col group hover:shadow-2xl transition-all duration-500">
                <div class="h-[350px] overflow-hidden relative">
                    <img :src="$store.healthcare.mainCard.image" loading="lazy" decoding="async"
                        class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                </div>
                <div class="p-8 flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="text-2xl font-bold text-spu-blue mb-4"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.titleAr : $store.healthcare.mainCard.titleEn">
                        </h3>
                        <p class="text-gray-600 leading-relaxed mb-6"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.descriptionAr : $store.healthcare.mainCard.descriptionEn">
                        </p>

                        <ul class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <template
                                x-for="feature in ($store.app.currentLang === 'ar' ? $store.healthcare.mainCard.featuresAr : $store.healthcare.mainCard.featuresEn)"
                                :key="feature">
                                <li class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center">
                                        <i class="fas fa-check text-green-600 text-[10px]"></i>
                                    </div>
                                    <span class="text-spu-blue font-medium text-sm" x-text="feature"></span>
                                </li>
                            </template>
                        </ul>
                    </div>

                    <a :href="$store.healthcare.mainCard.link"
                        class="inline-flex items-center justify-center px-10 py-3 bg-spu-blue text-white rounded-xl font-bold hover:bg-spu-red transition-all self-start">
                        <span
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.mainCard.actionAr : $store.healthcare.mainCard.actionEn"></span>
                    </a>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col gap-8">
                <div
                    class="bg-white rounded-[2rem] shadow-lg overflow-hidden flex flex-col h-1/2 group hover:shadow-xl transition-all">
                    <div class="h-48 overflow-hidden">
                        <img :src="$store.healthcare.hospitalCard.image" loading="lazy" decoding="async"
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    </div>
                    <div class="p-6">
                        <h4 class="text-xl font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.titleAr : $store.healthcare.hospitalCard.titleEn">
                        </h4>
                        <p class="text-gray-500 text-sm line-clamp-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.hospitalCard.descriptionAr : $store.healthcare.hospitalCard.descriptionEn">
                        </p>
                    </div>
                </div>

                <div
                    class="bg-white rounded-[2rem] shadow-lg overflow-hidden flex flex-col h-1/2 group hover:shadow-xl transition-all">
                    <div class="h-48 overflow-hidden">
                        <img :src="$store.healthcare.dentalCard.image" loading="lazy" decoding="async"
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    </div>
                    <div class="p-6">
                        <h4 class="text-xl font-bold text-spu-blue mb-2"
                            x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.titleAr : $store.healthcare.dentalCard.titleEn">
                        </h4>
                        <a :href="$store.healthcare.dentalCard.link"
                            class="text-spu-blue font-bold text-sm flex items-center gap-2 hover:text-spu-red transition-colors mt-2">
                            <span
                                x-text="$store.app.currentLang === 'ar' ? $store.healthcare.dentalCard.linkTextAr : $store.healthcare.dentalCard.linkTextEn"></span>
                            <i class="fas fa-chevron-left rtl:block hidden text-[10px]"></i>
                            <i class="fas fa-chevron-right ltr:block hidden text-[10px]"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-spu-blue rounded-[2.5rem] py-12 px-8 shadow-2xl relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 pointer-events-none"
                style="background-image: radial-gradient(circle, #fff 1.5px, transparent 1.5px); background-size: 30px 30px;">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 relative z-10">
                <template x-for="(stat, index) in $store.healthcare.stats" :key="stat.id">
                    <div class="flex flex-col items-center justify-center text-center px-4"
                        :class="index !== ($store.healthcare.stats.length - 1) ? 'lg:border-r lg:border-white/20' : ''">
                        <div class="flex items-baseline mb-3">
                            <span class="text-5xl lg:text-6xl font-bold text-white tracking-tighter" translate="no"
                                x-text="stat.current"></span>

                            <span class="text-4xl lg:text-5xl font-bold text-white/90 ml-1" x-show="stat.unitEn"
                                x-text="$store.app.currentLang === 'ar' ? (stat.unitAr || stat.unitEn) : stat.unitEn"></span>

                            <span class="text-3xl font-bold text-spu-red ml-1" translate="no"
                                x-text="$store.app.currentLang === 'ar' ? stat.suffixAr : stat.suffixEn"></span>
                        </div>
                        <p class="text-white/60 text-xs font-bold tracking-widest uppercase"
                            x-text="$store.app.currentLang === 'ar' ? stat.labelAr : stat.labelEn"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</section>
