<section id="requirements" x-data class="bg-section py-20 font-hacen lg:py-24">
    <div class="container grid gap-10 lg:grid-cols-[1fr_0.9fr] lg:items-start">
        <div class="grid gap-6">
            <template x-for="group in $store.admissionsPage.requirements" :key="group.titleEn">
                <article class="rounded-[30px] bg-white p-8 shadow-[0_20px_60px_rgba(20,30,70,0.08)]">
                    <h2 class="text-2xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? group.titleAr : group.titleEn"></h2>
                    <ul class="mt-5 space-y-3 text-[15px] leading-7 text-slate-600">
                        <template x-for="item in ($store.app.currentLang === 'ar' ? group.itemsAr : group.itemsEn)" :key="item">
                            <li class="flex gap-3">
                                <span class="mt-2 h-2 w-2 shrink-0 rounded-full bg-spu-red"></span>
                                <span x-text="item"></span>
                            </li>
                        </template>
                    </ul>
                </article>
            </template>
        </div>

        <div class="grid gap-6">
            <article id="fees" class="rounded-[30px] bg-spu-blue p-8 text-white shadow-[0_24px_70px_rgba(20,30,70,0.16)]">
                <h2 class="text-2xl font-bold" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.fees.titleAr : $store.admissionsPage.fees.titleEn"></h2>
                <p class="mt-5 text-[15px] leading-8 text-white/80" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.fees.summaryAr : $store.admissionsPage.fees.summaryEn"></p>
                <ul class="mt-6 space-y-3 text-[15px] leading-7 text-white/85">
                    <template x-for="item in ($store.app.currentLang === 'ar' ? $store.admissionsPage.fees.itemsAr : $store.admissionsPage.fees.itemsEn)" :key="item">
                        <li class="flex gap-3">
                            <span class="mt-2 h-2 w-2 shrink-0 rounded-full bg-spu-red"></span>
                            <span x-text="item"></span>
                        </li>
                    </template>
                </ul>
            </article>

            <article class="rounded-[30px] bg-white p-8 shadow-[0_20px_60px_rgba(20,30,70,0.08)]">
                <h2 class="text-2xl font-bold text-spu-blue" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.contact.titleAr : $store.admissionsPage.contact.titleEn"></h2>
                <p class="mt-5 text-[15px] leading-7 text-slate-600" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.contact.summaryAr : $store.admissionsPage.contact.summaryEn"></p>
                <div class="mt-6 space-y-4">
                    <template x-for="item in $store.admissionsPage.contact.items" :key="item.text">
                        <div class="flex items-center gap-4 rounded-[20px] bg-section px-5 py-4 text-spu-blue">
                            <i :class="item.icon"></i>
                            <span class="text-[15px] font-medium" x-html="item.text"></span>
                        </div>
                    </template>
                </div>
            </article>
        </div>
    </div>
</section>
