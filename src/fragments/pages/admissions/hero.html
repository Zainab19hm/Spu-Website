<section x-data class="page-hero relative overflow-hidden bg-spu-blue text-white font-hacen">
    <div class="absolute inset-0 opacity-60" style="background: radial-gradient(circle at top right, rgba(202,169,73,0.26), transparent 38%), radial-gradient(circle at bottom left, rgba(43,125,179,0.22), transparent 34%);"></div>
    <div class="container relative z-10 grid items-end gap-10 lg:grid-cols-[1.15fr_0.85fr]">
        <div class="max-w-3xl">
            <p class="text-sm font-bold uppercase tracking-[0.35em] text-white/60" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.hero.eyebrowAr : $store.admissionsPage.hero.eyebrowEn"></p>
            <h1 class="mt-6 text-4xl leading-tight font-bold md:text-5xl xl:text-6xl" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.hero.titleAr : $store.admissionsPage.hero.titleEn"></h1>
            <p class="mt-6 max-w-2xl text-lg leading-8 text-white/78" x-text="$store.app.currentLang === 'ar' ? $store.admissionsPage.hero.summaryAr : $store.admissionsPage.hero.summaryEn"></p>
        </div>

        <div class="grid gap-4 sm:grid-cols-3 lg:grid-cols-1 xl:grid-cols-3">
            <template x-for="item in $store.admissionsPage.quickFacts" :key="item.labelEn">
                <article class="rounded-[26px] border border-white/12 bg-white/10 p-6 backdrop-blur-md">
                    <p class="text-xl font-bold text-white" x-html="item.value"></p>
                    <p class="mt-2 text-sm uppercase tracking-[0.2em] text-white/62" x-text="$store.app.currentLang === 'ar' ? item.labelAr : item.labelEn"></p>
                </article>
            </template>
        </div>
    </div>
</section>
